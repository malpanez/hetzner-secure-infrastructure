# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks

title = "Hetzner Secure Infrastructure - GitLeaks Config"

# Ignore archived documentation with example secrets
[allowlist]
  description = "Allowlist for archived docs with example/dummy secrets"

  # Ignore all files in .archive/ directory (historical docs with examples)
  # Also ignore deployment guides with example vault values
  paths = [
    '''.archive/.*''',
    '''\.archive/.*''',
    '''DEPLOYMENT_GUIDE\.md''',
    '''docs/DEPLOYMENT\.md''',
    '''ansible/roles/.*/README\.md''',
    '''DEPLOY_FROM_SCRATCH\.md''',
    '''GO_LIVE_TODAY_CHECKLIST\.md''',
    '''EXECUTION_GUIDE\.md''',
    '''GUIA_RAPIDA\.md''',
    '''docs/guides/DEPLOYMENT_AUTOMATION_SETUP\.md''',
    '''docs/guides/TERRAFORM_CLOUD_SETUP\.md''',
    '''docs/infrastructure/HETZNER_API_TOKEN\.md''',
    '''terraform/backend\.tf''',
  ]

  # Ignore specific patterns that are known examples
  regexes = [
    '''example\.com''',
    '''tu_token.*''',
    '''your.*token''',
    '''dummy.*password''',
    '''REDACTED''',
  ]

  # Ignore commits that add .gitleaks.toml itself
  commits = []

[extend]
  # Use default gitleaks rules
  useDefault = true
