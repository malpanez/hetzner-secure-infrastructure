---
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default (CKV2_GHA_1): jobs only read the repo.
permissions:
  contents: read

jobs:
  # One job that runs the EXACT same pre-commit hooks a developer runs locally —
  # both the commit stage (fast: fmt, lint, secrets) and the pre-push stage
  # (heavier: tofu validate per-module, tflint, checkov). Installs the real
  # toolchain (OpenTofu + TFLint; Checkov/ansible-lint come from the hooks) so the
  # tf/security hooks actually execute — no SKIP, no local<->CI drift. All actions
  # are SHA-pinned (supply chain); the trailing comment records the version.
  pre-commit:
    name: Pre-commit (lint + IaC validate + security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      # Pinned to the versions in .tool-versions so CI == a developer's local tools.
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4  # v2
        with:
          tofu_version: 1.12.3
          tofu_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a  # v6
        with:
          tflint_version: v0.63.1

      - name: Install pre-commit + ansible-lint
        run: pip install 'ansible-core>=2.15,<2.18' ansible-lint pre-commit

      # PCT_TFPATH forces the terraform_fmt/validate hooks onto OpenTofu (the engine
      # we deploy with), not HashiCorp Terraform. Docker is present on the runner for
      # the gitleaks-docker hook.
      - name: Pre-commit — commit stage
        env:
          PCT_TFPATH: tofu
        run: pre-commit run --all-files --show-diff-on-failure --color always

      - name: Pre-commit — pre-push stage (validate + tflint + checkov)
        env:
          PCT_TFPATH: tofu
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure --color always
