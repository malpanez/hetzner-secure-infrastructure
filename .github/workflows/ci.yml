---
name: CI - Validate Infrastructure

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: read
  security-events: write
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: '1.10.4'
  PYTHON_VERSION: '3.12'
  GO_VERSION: '1.22'

jobs:
  # ========================================
  # Terraform Validation
  # ========================================
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

  # ========================================
  # Ansible Validation
  # ========================================
  ansible-validate:
    name: Validate Ansible
    runs-on: ubuntu-slim
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install UV and Ansible
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          uv venv
          source .venv/bin/activate
          uv pip install ansible ansible-lint yamllint requests python-dateutil

      - name: Install Ansible Galaxy requirements
        run: |
          source .venv/bin/activate
          cd ansible
          for i in 1 2 3; do
            ansible-galaxy install -r requirements.yml --timeout=120 && break
            echo "Retry $i/3 failed, waiting 10s..."
            sleep 10
          done
        continue-on-error: false

      - name: Create dummy vault password for CI
        run: echo "dummy_password_for_ci_only" > ~/.ansible_vault_pass

      - name: Ansible Syntax Check
        run: |
          source .venv/bin/activate
          cd ansible
          ansible-playbook playbooks/site.yml --syntax-check

      - name: Ansible Lint (own code only)
        run: |
          source .venv/bin/activate
          cd ansible
          # Install only collections used by our custom code (not heavy monitoring collections).
          # grafana.grafana + prometheus.prometheus (~300MB+) cause OOM on ubuntu-slim runners.
          mkdir -p /tmp/lint-collections
          # Force install into isolated path even if already installed globally.
          ansible-galaxy collection install \
            community.general ansible.posix community.mysql \
            -p /tmp/lint-collections \
            --force
          # Lint with isolated collections path and explicit playbook list (exclude monitoring.yml
          # and site.yml — they only orchestrate Galaxy roles, no custom code to lint).
          # ANSIBLE_COLLECTIONS_PATH (singular) is the current env var; plural form is deprecated.
          ANSIBLE_COLLECTIONS_PATH=/tmp/lint-collections \
          ansible-lint \
            playbooks/common.yml \
            playbooks/dual-wordpress.yml \
            playbooks/openbao.yml \
            playbooks/openbao-transit-bootstrap.yml \
            playbooks/openbao-bootstrap.yml \
            playbooks/setup-openbao-rotation.yml \
            playbooks/wordpress.yml \
            playbooks/wordpress-only.yml \
            playbooks/validate.yml \
            roles/ \
            --exclude roles/geerlingguy.mysql/ \
            --parseable | tee ../ansible-lint-report.txt; exit ${PIPESTATUS[0]}
        timeout-minutes: 15

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ansible-lint-report
          path: ansible-lint-report.txt

      - name: YAML Lint
        run: |
          source .venv/bin/activate
          yamllint ansible/

  # ========================================
  # Molecule Tests (Ansible Roles)
  # ========================================
  molecule-test:
    name: Test Ansible Roles
    runs-on: ubuntu-latest
    strategy:
      matrix:
        role:
          - apparmor
          - common
          - fail2ban
          - firewall
          - monitoring
          - nginx_wordpress
          - openbao
          - security_hardening
          - ssh_2fa
          - valkey
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install UV and Molecule
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          uv venv
          source .venv/bin/activate
          uv pip install \
            'ansible-core>=2.15,<2.18' \
            'ansible>=8.0,<10.0' \
            molecule 'molecule-plugins[docker]' \
            ansible-lint pytest testinfra

      - name: Run Molecule Test
        run: |
          source .venv/bin/activate
          cd ansible/roles/${{ matrix.role }}
          molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ALLOW_BROKEN_CONDITIONALS: 'true'

  # ========================================
  # Security Scan
  # ========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a
        id: grype
        with:
          path: '.'
          severity-cutoff: high
          output-format: sarif
          fail-build: false

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
        if: always()
        continue-on-error: true

  # ========================================
  # Documentation Check
  # ========================================
  docs-check:
    name: Check Documentation
    runs-on: ubuntu-latest  # Changed from ubuntu-slim to support Docker-based actions

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Check for broken links in Markdown
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368  # v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
        continue-on-error: true

      - name: Verify all docs exist
        run: |
          required_docs=(
            "README.md"
            "docs/INDEX.md"
            "docs/guides/DEPLOYMENT_GUIDE.md"
          )

          missing=0
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "❌ Missing: $doc"
              missing=1
            else
              echo "✅ Found: $doc"
            fi
          done

          exit $missing

  # ========================================
  # Terratest (Go Tests)
  # ========================================
  terratest:
    name: Terratest Infrastructure Tests
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: terraform/test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Go modules
        working-directory: terraform/test
        run: go mod download

      - name: Run Terratest (short mode)
        working-directory: terraform/test
        run: go test -v -timeout 15m -short
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}

  # ========================================
  # Pre-commit checks
  # ========================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install UV and pre-commit
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          uv venv
          source .venv/bin/activate
          uv pip install pre-commit

      - name: Install terraform-docs
        run: |
          # Install terraform-docs for pre-commit hook
          TFDOCS_VERSION="v0.19.0"
          curl -sSLo /tmp/terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/${TFDOCS_VERSION}/terraform-docs-${TFDOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp
          chmod +x /tmp/terraform-docs
          sudo mv /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit
        run: |
          source .venv/bin/activate
          pre-commit run --all-files --show-diff-on-failure

  # ========================================
  # CodeQL Analysis
  # ========================================
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          languages: python, go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4

  # ========================================
  # Dependency Review
  # ========================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@9129d7d40b8c12c1ed0f60400d00c92d437adcce  # v4.1.3
        with:
          fail-on-severity: moderate

