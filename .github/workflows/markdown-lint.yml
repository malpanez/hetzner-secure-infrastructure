name: Markdown Linting

on:
  push:
    branches: [main, develop]
    paths:
      - '**.md'
      - '.github/workflows/markdown-lint.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.md'

# Least-privilege default (CKV2_GHA_1): these jobs only read the repo.
permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run markdownlint
        # Maintained action by the markdownlint author; deps frozen at this SHA.
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23.2.0
        with:
          config: .markdownlint.json
          globs: '**/*.md'
        continue-on-error: true

  markdown-link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 5  # backstop: lychee never runs away again

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Check for broken internal doc links (offline, deterministic)
        # Replaces lychee: even with --offline it kept exceeding the 5-min backstop
        # and getting cancelled. Pure-Python, runs in seconds, verifies relative/local
        # markdown links and flags any that escape the repo root. Mirrors ci.yml.
        run: |
          python3 - <<'PY'
          import re, pathlib, sys
          root = pathlib.Path('.')
          root_abs = root.resolve()
          md_link = re.compile(r'\[[^\]]*\]\(([^)]+)\)')
          def skip(p):
              s = str(p)
              return any(x in s for x in ('/.git/', '/.terraform/', '/node_modules/'))
          broken, checked = {}, 0
          for f in root.rglob('*.md'):
              if skip(f):
                  continue
              for ln in md_link.findall(f.read_text(encoding='utf-8', errors='ignore')):
                  ln = ln.strip()
                  if ln.startswith(('http://', 'https://', 'mailto:', '#', 'tel:', '{{', 'data:', '/')):
                      continue
                  target = ln.split('#')[0].split('?')[0]
                  if not target:
                      continue
                  checked += 1
                  dest = (f.parent / target).resolve()
                  if not dest.exists() or not dest.is_relative_to(root_abs):
                      broken.setdefault(str(f), []).append(ln)
          print(f"Checked {checked} internal markdown links")
          if broken:
              total = sum(len(v) for v in broken.values())
              print(f"\n::error::{total} broken internal markdown link(s)")
              for src in sorted(broken):
                  for ln in sorted(set(broken[src])):
                      print(f"  {src} -> {ln}")
              sys.exit(1)
          print("✅ No broken internal markdown links")
          PY

  markdown-toc:
    name: Check Table of Contents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install markdown-toc
        run: npm install -g markdown-toc@1.2.0

      - name: Verify TOCs are up-to-date
        run: |
          for file in $(find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*"); do
            if grep -q "<!-- toc -->" "$file"; then
              echo "Checking TOC in $file"
              markdown-toc -i "$file" --no-write
            fi
          done
        continue-on-error: true
