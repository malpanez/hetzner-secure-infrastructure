---
# Checkov configuration — https://www.checkov.io/2.Basics/Configuring%20Checkov.html
# Runs from repo root; Checkov is multi-framework, so this covers Terraform,
# Ansible, GitHub Actions and Dockerfiles in one pass. Consumed by the pre-commit
# `checkov` hook (pre-push) and by CI, which runs the same hook.
directory:
  - .
skip-path:
  # Vendored provider/module downloads — not our code.
  - .terraform
  # Molecule test scaffolding (test Dockerfiles + verify tasks) is ephemeral CI test
  # infrastructure, not production IaC — the Docker/uri hardening checks don't apply.
  - molecule
skip-check:
  # CKV2_ANSIBLE_3 "Ensure block is handling task errors properly" requires every
  # Ansible `block:` to carry a `rescue:`. Opinionated and not this project's style
  # (blocks group related tasks; failure handling is at play/handler level). Waived
  # globally — the alternative would be 38 no-op `rescue:` stanzas.
  - CKV2_ANSIBLE_3
# No baseline: every finding is either fixed or waived inline with rationale (the S3
# waivers live at the resource in terraform/modules/object-storage/main.tf), so the
# gate is honest — there is no hidden "accepted debt" file. A NEW real finding fails CI.
compact: true
quiet: true
