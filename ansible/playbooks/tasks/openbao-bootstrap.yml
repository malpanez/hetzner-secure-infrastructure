---
# IMPORTANT: Before running this playbook on a fresh server, clear ansible.log first:
#   > ansible/ansible.log
# After the run, unseal keys and root token will appear in the debug task output.
# IMMEDIATELY save them to BitWarden, then clear the log again:
#   > ansible/ansible.log
# The wp_admin_user should be set to a non-obvious value (e.g. tmt_admin) in vault vars.

- name: Check OpenBao status
  ansible.builtin.command: "{{ openbao_cli }} status -format=json"
  environment: "{{ openbao_env }}"
  register: openbao_status_cmd
  changed_when: false
  failed_when: false
  tags: [openbao, bootstrap]

- name: Parse OpenBao status
  ansible.builtin.set_fact:
    openbao_status: "{{ (openbao_status_cmd.stdout | default('{}')) | from_json }}"
  # bao status returns rc=0 (unsealed), rc=1 (error), rc=2 (sealed but valid JSON)
  when: openbao_status_cmd.rc in [0, 2]
  tags: [openbao, bootstrap]

- name: Debug OpenBao status
  ansible.builtin.debug:
    msg:
      - "OpenBao status check: rc={{ openbao_status_cmd.rc }}"
      - "Initialized: {{ (openbao_status | default({})).initialized | default('unknown') }}"
      - "Sealed: {{ (openbao_status | default({})).sealed | default('unknown') }}"
      - "Recovery Seal Type: {{ (openbao_status | default({})).recovery_seal_type | default('none') }}"
  tags: [openbao, bootstrap]

# For Transit auto-unseal, use recovery shares instead of unseal keys
- name: Initialize OpenBao with Transit auto-unseal (first run only)
  ansible.builtin.command: >-
    {{ openbao_cli }} operator init
    -format=json
    -recovery-shares={{ openbao_key_shares }}
    -recovery-threshold={{ openbao_key_threshold }}
  environment: "{{ openbao_env }}"
  register: openbao_init_cmd
  changed_when: true
  when:
    - not ((openbao_status | default({})).initialized | default(false) | bool)
    - openbao_transit_enabled | default(false) | bool
  no_log: true
  tags: [openbao, bootstrap]

# For standard OpenBao (no Transit), use regular unseal keys
- name: Initialize OpenBao standard (first run only)
  ansible.builtin.command: >-
    {{ openbao_cli }} operator init
    -format=json
    -key-shares={{ openbao_key_shares }}
    -key-threshold={{ openbao_key_threshold }}
  environment: "{{ openbao_env }}"
  register: openbao_init_cmd_standard
  changed_when: true
  when:
    - not ((openbao_status | default({})).initialized | default(false) | bool)
    - not (openbao_transit_enabled | default(false) | bool)
  no_log: true
  tags: [openbao, bootstrap]

# Merge init results from either method
- name: Set init result from Transit or standard init
  ansible.builtin.set_fact:
    openbao_init_result: "{{ openbao_init_cmd if (openbao_init_cmd is defined and openbao_init_cmd is not skipped) else openbao_init_cmd_standard }}"
  when: (openbao_init_cmd is defined and openbao_init_cmd is not skipped) or (openbao_init_cmd_standard is defined and openbao_init_cmd_standard is not skipped)
  tags: [openbao, bootstrap]

- name: Capture OpenBao init output (Transit auto-unseal)
  ansible.builtin.set_fact:
    openbao_init: "{{ (openbao_init_cmd.stdout | default('{}')) | from_json }}"
    openbao_bootstrap_token: "{{ (openbao_init_cmd.stdout | from_json).root_token }}"
  when:
    - openbao_init_cmd is defined
    - openbao_init_cmd is not skipped
    - openbao_init_cmd.stdout is defined
    - openbao_transit_enabled | default(false) | bool
  no_log: true
  tags: [openbao, bootstrap]

- name: Capture OpenBao init output (standard)
  ansible.builtin.set_fact:
    openbao_init: "{{ (openbao_init_cmd_standard.stdout | default('{}')) | from_json }}"
    openbao_bootstrap_token: "{{ (openbao_init_cmd_standard.stdout | from_json).root_token }}"
  when:
    - openbao_init_cmd_standard is defined
    - openbao_init_cmd_standard is not skipped
    - openbao_init_cmd_standard.stdout is defined
    - not (openbao_transit_enabled | default(false) | bool)
  no_log: true
  tags: [openbao, bootstrap]

- name: Display OpenBao primary init credentials (SAVE NOW)
  ansible.builtin.debug:
    msg: "{{ init_display.split('\n') }}"
  vars:
    init_display: |
      ========================================
      PRIMARY OPENBAO INITIALIZED — SAVE NOW
      ========================================

      Recovery Keys (need {{ openbao_key_threshold }} of {{ openbao_key_shares }} to regenerate root token):
      {% if openbao_init.recovery_keys_b64 is defined %}
      {% for key in openbao_init.recovery_keys_b64 %}
      Recovery Key {{ loop.index }}: {{ key }}
      {% endfor %}
      {% elif openbao_init.unseal_keys_b64 is defined %}
      {% for key in openbao_init.unseal_keys_b64 %}
      Unseal Key {{ loop.index }}: {{ key }}
      {% endfor %}
      {% endif %}

      Root Token: {{ openbao_bootstrap_token }}

      ========================================
      CRITICAL — STORE IN PASSWORD MANAGER
      ========================================
  when:
    - openbao_init is defined
    - openbao_bootstrap_token is defined
  tags: [openbao, bootstrap]

# Persist token to disk immediately after init so it survives play failures.
# File is removed at the end of a successful bootstrap.
- name: Persist bootstrap token to server (survives play failure)
  ansible.builtin.copy:
    content: "{{ openbao_bootstrap_token }}"
    dest: /root/.openbao-bootstrap-token
    owner: root
    group: root
    mode: "0600"
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

# Recovery path: if already initialized and token file exists from a previous
# partial run, load it so seeding tasks can resume without re-initializing.
- name: Check for persisted bootstrap token (recovery path)
  ansible.builtin.stat:
    path: /root/.openbao-bootstrap-token
  register: openbao_token_file
  when:
    - openbao_bootstrap_token is not defined
    - (openbao_status | default({})).initialized | default(false) | bool
  tags: [openbao, bootstrap]

- name: Load persisted bootstrap token (recovery path)
  ansible.builtin.slurp:
    src: /root/.openbao-bootstrap-token
  register: openbao_token_slurp
  when:
    - openbao_bootstrap_token is not defined
    - openbao_token_file is defined
    - openbao_token_file.stat is defined
    - openbao_token_file.stat.exists
  no_log: true
  tags: [openbao, bootstrap]

- name: Set bootstrap token from persisted file (recovery path)
  ansible.builtin.set_fact:
    openbao_bootstrap_token: "{{ openbao_token_slurp.content | b64decode | trim }}"
  when:
    - openbao_token_slurp is defined
    - not (openbao_token_slurp.skipped | default(true))
  no_log: true
  tags: [openbao, bootstrap]

# Re-run path: accept an explicit admin token via extra-vars so seeding tasks
# can execute against an already-initialized vault without needing the bootstrap
# token file. Pass as: --extra-vars "openbao_admin_token=<root-or-admin-token>"
- name: Use provided admin token as bootstrap token (re-run path)
  ansible.builtin.set_fact:
    openbao_bootstrap_token: "{{ openbao_admin_token }}"
  when:
    - openbao_bootstrap_token is not defined
    - openbao_admin_token is defined
  no_log: true
  tags: [openbao, bootstrap]

# Transit auto-unseal: wait for OpenBao to auto-unseal itself
- name: Wait for OpenBao to auto-unseal (Transit mode)
  ansible.builtin.command: "{{ openbao_cli }} status -format=json"
  environment: "{{ openbao_env }}"
  register: openbao_unseal_wait
  until: (openbao_unseal_wait.stdout | from_json).sealed == false
  retries: 12
  delay: 5
  changed_when: false
  when:
    - openbao_init is defined
    - openbao_transit_enabled | default(false) | bool
  tags: [openbao, bootstrap]

# Standard mode: manual unseal with keys
- name: Unseal OpenBao (using first threshold keys - standard mode only)
  ansible.builtin.command: "{{ openbao_cli }} operator unseal {{ item }}"
  environment: "{{ openbao_env }}"
  loop: "{{ openbao_init.unseal_keys_b64[0:openbao_key_threshold] }}"
  changed_when: true
  when:
    - openbao_init is defined
    - not (openbao_transit_enabled | default(false) | bool)
  no_log: true
  tags: [openbao, bootstrap]

- name: Enable KV secrets engine (kv-v2)
  ansible.builtin.command: "{{ openbao_cli }} secrets enable -path=secret kv-v2"
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  register: openbao_kv_enable
  changed_when: openbao_kv_enable.rc == 0
  failed_when: false
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed WordPress database credentials in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/wordpress
    db_name={{ wordpress_db_name | default('wordpress') }}
    db_user={{ wordpress_db_user | default('wordpress') }}
    db_password={{ wordpress_db_password }}
    admin_password={{ vault_wordpress_admin_password | default(wordpress_admin_password) }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed MariaDB root password in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/mariadb
    root_password={{ mariadb_root_password | default(vault_mariadb_root_password) }}
    exporter_password={{ vault_mariadb_exporter_password }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - vault_mariadb_exporter_password is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Enable database secrets engine
  ansible.builtin.command: "{{ openbao_cli }} secrets enable database"
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  register: openbao_db_enable
  changed_when: openbao_db_enable.rc == 0
  failed_when: false
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]


- name: Configure OpenBao role for WordPress DB credentials
  ansible.builtin.command: >-
    {{ openbao_cli }} write database/roles/wordpress
    db_name=wordpress
    creation_statements="CREATE USER '{{ '{{' }}name{{ '}}' }}'@'%' IDENTIFIED BY '{{ '{{' }}password{{ '}}' }}'; GRANT ALL PRIVILEGES ON {{ wordpress_db_name | default('wordpress') }}.* TO '{{ '{{' }}name{{ '}}' }}'@'%';"
    default_ttl=2160h
    max_ttl=2160h
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Configure OpenBao role for WordPress Academy DB credentials
  ansible.builtin.command: >-
    {{ openbao_cli }} write database/roles/wordpress-academy
    db_name=wordpress-academy
    creation_statements="CREATE USER '{{ '{{' }}name{{ '}}' }}'@'%' IDENTIFIED BY '{{ '{{' }}password{{ '}}' }}'; GRANT ALL PRIVILEGES ON wordpress_academy.* TO '{{ '{{' }}name{{ '}}' }}'@'%';"
    default_ttl=2160h
    max_ttl=2160h
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao policy for WordPress credential rotation
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'POLICY' | {{ openbao_cli }} policy write wordpress-rotator -
    path "database/creds/wordpress" {
      capabilities = ["read"]
    }
    path "secret/data/wordpress" {
      capabilities = ["create", "update"]
    }
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    POLICY
  args:
    executable: /bin/bash
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao policy for WordPress Academy credential rotation
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'POLICY' | {{ openbao_cli }} policy write wordpress-academy-rotator -
    path "database/creds/wordpress-academy" {
      capabilities = ["read"]
    }
    path "secret/data/wordpress-academy" {
      capabilities = ["create", "update", "patch"]
    }
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    POLICY
  args:
    executable: /bin/bash
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao policy for MariaDB root rotation
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'POLICY' | {{ openbao_cli }} policy write mariadb-rotator -
    path "secret/data/mariadb" {
      capabilities = ["read", "create", "update", "patch"]
    }
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    POLICY
  args:
    executable: /bin/bash
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed backup S3 credentials and encryption passphrase in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/backup
    s3_access_key={{ backup_s3_access_key | default(vault_hetzner_s3_access_key) }}
    s3_secret_key={{ backup_s3_secret_key | default(vault_hetzner_s3_secret_key) }}
    encryption_passphrase={{ backup_encryption_passphrase | default(vault_backup_encryption_passphrase) }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - vault_hetzner_s3_access_key is defined
    - vault_hetzner_s3_secret_key is defined
    - vault_backup_encryption_passphrase is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed Grafana admin password in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/grafana
    admin_password={{ vault_grafana_admin_password }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - vault_grafana_admin_password is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed SMTP credentials in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/smtp
    user={{ vault_smtp_user }}
    app_password={{ vault_smtp_app_password }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - vault_smtp_user is defined
    - vault_smtp_app_password is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed Stripe keys in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/stripe
    publishable_key={{ vault_stripe_publishable_key }}
    secret_key={{ vault_stripe_secret_key }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - vault_stripe_publishable_key is defined
    - vault_stripe_secret_key is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Seed WordPress Academy admin password in OpenBao
  ansible.builtin.command: >-
    {{ openbao_cli }} kv put secret/wordpress-academy
    db_name=wordpress_academy
    db_user=wp_academy
    db_password={{ vault_wp_academy_db_password }}
    admin_password={{ vault_wordpress_academy_admin_password }}
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when:
    - openbao_bootstrap_token is defined
    - vault_wordpress_academy_admin_password is defined
    - vault_wp_academy_db_password is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao policy for backup reader
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'POLICY' | {{ openbao_cli }} policy write backup-reader -
    path "secret/data/backup" {
      capabilities = ["read"]
    }
    path "secret/data/mariadb" {
      capabilities = ["read"]
    }
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    POLICY
  args:
    executable: /bin/bash
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao token for backup
  ansible.builtin.command: >-
    {{ openbao_cli }} token create -format=json -orphan -period=2160h -policy=backup-reader
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  register: openbao_backup_token_cmd
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Capture backup token on controller
  ansible.builtin.set_fact:
    openbao_backup_token: "{{ (openbao_backup_token_cmd.stdout | from_json).auth.client_token }}"
  delegate_to: localhost
  run_once: true
  when:
    - openbao_backup_token_cmd is defined
    - not (openbao_backup_token_cmd.skipped | default(false))
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao token for WordPress rotation
  ansible.builtin.command: >-
    {{ openbao_cli }} token create -format=json -orphan -period=2160h -policy=wordpress-rotator
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  register: openbao_wordpress_token_cmd
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Capture WordPress rotation token on controller
  ansible.builtin.set_fact:
    openbao_wordpress_token: "{{ (openbao_wordpress_token_cmd.stdout | from_json).auth.client_token }}"
  delegate_to: localhost
  run_once: true
  when:
    - openbao_wordpress_token_cmd is defined
    - not (openbao_wordpress_token_cmd.skipped | default(false))
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao token for WordPress Academy rotation
  ansible.builtin.command: >-
    {{ openbao_cli }} token create -format=json -orphan -period=2160h -policy=wordpress-academy-rotator
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  register: openbao_academy_token_cmd
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Capture WordPress Academy rotation token on controller
  ansible.builtin.set_fact:
    openbao_academy_token: "{{ (openbao_academy_token_cmd.stdout | from_json).auth.client_token }}"
  delegate_to: localhost
  run_once: true
  when:
    - openbao_academy_token_cmd is defined
    - not (openbao_academy_token_cmd.skipped | default(false))
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao token for MariaDB rotation
  ansible.builtin.command: >-
    {{ openbao_cli }} token create -format=json -orphan -period=2160h -policy=mariadb-rotator
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  register: openbao_mariadb_token_cmd
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Capture MariaDB rotation token on controller
  ansible.builtin.set_fact:
    openbao_mariadb_token: "{{ (openbao_mariadb_token_cmd.stdout | from_json).auth.client_token }}"
  delegate_to: localhost
  run_once: true
  when:
    - openbao_mariadb_token_cmd is defined
    - not (openbao_mariadb_token_cmd.skipped | default(false))
  no_log: true
  tags: [openbao, bootstrap]

- name: Display OpenBao init keys and root token (Transit mode)
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  OPENBAO INITIALIZED (Transit Auto-Unseal)"
      - "=========================================="
      - ""
      - "Recovery Keys (save securely):"
      - "  1. {{ openbao_init.recovery_keys_b64[0] }}"
      - "  2. {{ openbao_init.recovery_keys_b64[1] }}"
      - "  3. {{ openbao_init.recovery_keys_b64[2] }}"
      - "  4. {{ openbao_init.recovery_keys_b64[3] }}"
      - "  5. {{ openbao_init.recovery_keys_b64[4] }}"
      - ""
      - "Root Token:"
      - "  {{ openbao_init.root_token }}"
      - ""
      - "NOTE: Recovery keys are for emergency access only."
      - "OpenBao will auto-unseal via Transit instance."
      - "Token also saved to /root/.openbao-bootstrap-token (removed on success)."
      - "=========================================="
  when:
    - openbao_init is defined
    - openbao_transit_enabled | default(false) | bool
  tags: [openbao, bootstrap]

- name: Display root token (recovery path — bootstrap already initialized)
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  BOOTSTRAP TOKEN LOADED FROM FILE        "
      - "=========================================="
      - ""
      - "OpenBao was already initialized. Token loaded from:"
      - "  /root/.openbao-bootstrap-token"
      - ""
      - "Root Token: {{ openbao_bootstrap_token }}"
      - ""
      - "If seeding fails again, the token is still in that file."
      - "=========================================="
  when:
    - openbao_bootstrap_token is defined
    - openbao_init is not defined
  tags: [openbao, bootstrap]

- name: Display OpenBao init keys and root token (standard mode)
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  OPENBAO INITIALIZED - COPY THESE NOW   "
      - "=========================================="
      - ""
      - "Unseal Keys (need {{ openbao_key_threshold }} to unseal):"
      - "  1. {{ openbao_init.unseal_keys_b64[0] }}"
      - "  2. {{ openbao_init.unseal_keys_b64[1] }}"
      - "  3. {{ openbao_init.unseal_keys_b64[2] }}"
      - "  4. {{ openbao_init.unseal_keys_b64[3] }}"
      - "  5. {{ openbao_init.unseal_keys_b64[4] }}"
      - ""
      - "Root Token:"
      - "  {{ openbao_init.root_token }}"
      - "=========================================="
  when:
    - openbao_init is defined
    - not (openbao_transit_enabled | default(false) | bool)
  tags: [openbao, bootstrap]

- name: Remind to store rotation tokens in vault
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  SAVE THESE TOKENS IN ANSIBLE VAULT     "
      - "=========================================="
      - ""
      - "Add to inventory/group_vars/all/secrets.yml:"
      - "  openbao_wordpress_rotation_token: {{ openbao_wordpress_token | default('N/A') }}"
      - "  openbao_academy_rotation_token: {{ openbao_academy_token | default('N/A') }}"
      - "  openbao_mariadb_rotation_token: {{ openbao_mariadb_token | default('N/A') }}"
      - "  openbao_backup_token: {{ openbao_backup_token | default('N/A') }}"
      - ""
      - "Then place tokens on the server:"
      - "  echo '<token>' > /root/.openbao-token         && chmod 600 /root/.openbao-token"
      - "  echo '<token>' > /root/.openbao-academy-token && chmod 600 /root/.openbao-academy-token"
      - "  echo '<token>' > /root/.openbao-mariadb-token && chmod 600 /root/.openbao-mariadb-token"
      - "  echo '<token>' > /root/.openbao-backup-token  && chmod 600 /root/.openbao-backup-token"
      - ""
      - "Then re-run setup-openbao-rotation.yml to deploy rotation scripts and timers."
      - "=========================================="
  when: >
    openbao_wordpress_token is defined or
    openbao_academy_token is defined or
    openbao_mariadb_token is defined or
    openbao_backup_token is defined
  tags: [openbao, bootstrap]

- name: Create OpenBao policy for read-only secret access
  ansible.builtin.shell: |
    set -euo pipefail
    cat <<'POLICY' | {{ openbao_cli }} policy write read-secrets -
    path "secret/data/*" {
      capabilities = ["read", "list"]
    }
    path "secret/metadata/*" {
      capabilities = ["list"]
    }
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    POLICY
  args:
    executable: /bin/bash
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Create OpenBao read-only token and write to server
  ansible.builtin.shell: |
    set -euo pipefail
    {{ openbao_cli }} token create -format=json -orphan -period=8760h -policy=read-secrets \
      | jq -r '.auth.client_token' > /root/.openbao-readonly-token
    chmod 600 /root/.openbao-readonly-token
  args:
    executable: /bin/bash
  environment: "{{ openbao_env | combine({'VAULT_TOKEN': openbao_bootstrap_token}) }}"
  changed_when: true
  when: openbao_bootstrap_token is defined
  no_log: true
  tags: [openbao, bootstrap]

- name: Remove persisted bootstrap token (bootstrap complete)
  ansible.builtin.file:
    path: /root/.openbao-bootstrap-token
    state: absent
  when: openbao_bootstrap_token is defined
  tags: [openbao, bootstrap]
