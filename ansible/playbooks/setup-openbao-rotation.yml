---
# Setup OpenBao automatic secret rotation for WordPress database credentials
#
# Usage:
#   ansible-playbook -i inventory/hetzner.hcloud.yml playbooks/setup-openbao-rotation.yml

- name: Setup OpenBao Automatic Secret Rotation
  hosts: secrets_servers
  become: true
  gather_facts: true

  vars:
    openbao_db_password: "{{ vault_openbao_mariadb_password }}"
    wordpress_db_name: wordpress

  tasks:
    - name: Install jq for JSON parsing
      ansible.builtin.apt:
        name: jq
        state: present
        update_cache: true

    - name: Create secret rotation script
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          # WordPress Database Secret Rotation Script
          # Managed by Ansible - DO NOT EDIT MANUALLY

          set -euo pipefail

          # Configuration
          OPENBAO_ADDR="http://127.0.0.1:8200"
          LOG_FILE="/var/log/wordpress-secret-rotation.log"
          WP_PATH="/var/www/twomindstrading.com"

          # Logging function
          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          # Error handling
          error_exit() {
              log "ERROR: $1"
              exit 1
          }

          log "Starting WordPress database secret rotation"

          # Check if OpenBao is running
          if ! systemctl is-active --quiet openbao; then
              error_exit "OpenBao service is not running"
          fi

          # Login to OpenBao (use token from file)
          if [ ! -f /root/.openbao-token ]; then
              error_exit "OpenBao token file not found at /root/.openbao-token"
          fi

          export OPENBAO_TOKEN
          OPENBAO_TOKEN=$(cat /root/.openbao-token)

          # Fetch new database credentials from OpenBao
          log "Fetching new database credentials from OpenBao"
          CREDS=$(curl -s -H "X-Vault-Token: $OPENBAO_TOKEN" \
                       "$OPENBAO_ADDR/v1/database/creds/wordpress" || error_exit "Failed to fetch credentials from OpenBao")

          # Parse credentials
          NEW_USER=$(echo "$CREDS" | jq -r '.data.username' || error_exit "Failed to parse username")
          NEW_PASS=$(echo "$CREDS" | jq -r '.data.password' || error_exit "Failed to parse password")

          if [ "$NEW_USER" == "null" ] || [ "$NEW_PASS" == "null" ]; then
              error_exit "Invalid credentials received from OpenBao"
          fi

          log "New credentials generated: user=$NEW_USER"

          # Update WordPress configuration
          log "Updating wp-config.php with new credentials"
          sudo -u www-data wp --path="$WP_PATH" config set DB_USER "$NEW_USER" --type=constant || error_exit "Failed to update DB_USER"
          sudo -u www-data wp --path="$WP_PATH" config set DB_PASSWORD "$NEW_PASS" --type=constant || error_exit "Failed to update DB_PASSWORD"

          # Test database connection
          log "Testing database connection"
          sudo -u www-data wp --path="$WP_PATH" db check || error_exit "Database connection test failed"

          # Restart PHP-FPM to apply changes
          log "Restarting PHP-FPM"
          systemctl reload php8.3-fpm || error_exit "Failed to reload PHP-FPM"

          # Wait for PHP-FPM to fully restart
          sleep 2

          # Verify WordPress can connect
          log "Verifying WordPress database connectivity"
          sudo -u www-data wp --path="$WP_PATH" db query "SELECT 1;" > /dev/null || error_exit "WordPress cannot connect to database"

          log "WordPress database secret rotation completed successfully"
          log "Old user credentials will expire in 24 hours"

          # Clean up old users (optional - uncomment if you want automatic cleanup)
          # log "Cleaning up expired database users"
          # mysql -e "SELECT user FROM mysql.user WHERE user LIKE 'v-wordpress-%' AND Create_time < DATE_SUB(NOW(), INTERVAL 48 HOUR);" | tail -n +2 | xargs -I {} mysql -e "DROP USER IF EXISTS '{}'@'localhost';"

          exit 0
        dest: /usr/local/bin/rotate-wordpress-secrets.sh
        mode: '0750'
        owner: root
        group: root

    - name: Create systemd service for secret rotation
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Rotate WordPress Database Credentials
          After=network.target openbao.service mariadb.service
          Requires=openbao.service mariadb.service

          [Service]
          Type=oneshot
          User=root
          ExecStart=/usr/local/bin/rotate-wordpress-secrets.sh
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=wordpress-rotation

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/wordpress-secret-rotate.service
        mode: '0644'

    - name: Create systemd timer for daily rotation
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Rotate WordPress secrets daily
          Documentation=man:systemd.timer(5)

          [Timer]
          # Run daily at 3 AM
          OnCalendar=daily
          OnCalendar=*-*-* 03:00:00
          Persistent=true
          RandomizedDelaySec=300

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/wordpress-secret-rotate.timer
        mode: '0644'

    - name: Create log file for rotation
      ansible.builtin.file:
        path: /var/log/wordpress-secret-rotation.log
        state: touch
        owner: root
        group: root
        mode: '0640'

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable secret rotation timer
      ansible.builtin.systemd:
        name: wordpress-secret-rotate.timer
        enabled: true
        state: started

    - name: Display timer status
      ansible.builtin.command: systemctl status wordpress-secret-rotate.timer --no-pager
      register: timer_status
      changed_when: false

    - name: Display results
      ansible.builtin.debug:
        msg:
          - "Secret rotation timer installed successfully"
          - "Timer status: {{ timer_status.stdout_lines }}"

    - name: Create academy secret rotation script
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          set -euo pipefail

          OPENBAO_ADDR="http://127.0.0.1:8200"
          LOG_FILE="/var/log/wordpress-academy-secret-rotation.log"
          WP_PATH="/var/www/academy.twomindstrading.com"
          TOKEN_FILE="/root/.openbao-academy-token"

          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          error_exit() {
              log "ERROR: $1"
              exit 1
          }

          log "Starting WordPress Academy database secret rotation"

          if ! systemctl is-active --quiet openbao; then
              error_exit "OpenBao service is not running"
          fi

          if [ ! -f "$TOKEN_FILE" ]; then
              error_exit "OpenBao token file not found at $TOKEN_FILE"
          fi

          export OPENBAO_TOKEN
          OPENBAO_TOKEN=$(cat "$TOKEN_FILE")

          log "Fetching new database credentials from OpenBao"
          CREDS=$(curl -s -H "X-Vault-Token: $OPENBAO_TOKEN" \
                       "$OPENBAO_ADDR/v1/database/creds/wordpress-academy" || error_exit "Failed to fetch credentials from OpenBao")

          NEW_USER=$(echo "$CREDS" | jq -r '.data.username' || error_exit "Failed to parse username")
          NEW_PASS=$(echo "$CREDS" | jq -r '.data.password' || error_exit "Failed to parse password")

          if [ "$NEW_USER" == "null" ] || [ "$NEW_PASS" == "null" ]; then
              error_exit "Invalid credentials received from OpenBao"
          fi

          log "New credentials generated: user=$NEW_USER"

          log "Updating wp-config.php with new credentials"
          sudo -u www-data wp --path="$WP_PATH" config set DB_USER "$NEW_USER" --type=constant || error_exit "Failed to update DB_USER"
          sudo -u www-data wp --path="$WP_PATH" config set DB_PASSWORD "$NEW_PASS" --type=constant || error_exit "Failed to update DB_PASSWORD"

          log "Testing database connection"
          sudo -u www-data wp --path="$WP_PATH" db check || error_exit "Database connection test failed"

          log "Reloading PHP-FPM"
          systemctl reload php8.3-fpm || error_exit "Failed to reload PHP-FPM"

          sleep 2

          log "Verifying WordPress database connectivity"
          sudo -u www-data wp --path="$WP_PATH" db query "SELECT 1;" > /dev/null || error_exit "WordPress cannot connect to database"

          log "WordPress Academy database secret rotation completed successfully"
          log "Old user credentials will expire in 24 hours"

          exit 0
        dest: /usr/local/bin/rotate-wordpress-academy-secrets.sh
        mode: '0750'
        owner: root
        group: root

    - name: Create academy secret rotation systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Rotate WordPress Academy Database Credentials
          After=network.target openbao.service mariadb.service
          Requires=openbao.service mariadb.service

          [Service]
          Type=oneshot
          User=root
          ExecStart=/usr/local/bin/rotate-wordpress-academy-secrets.sh
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=wordpress-academy-rotation

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/wordpress-academy-secret-rotate.service
        mode: '0644'

    - name: Create academy secret rotation systemd timer
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Rotate WordPress Academy secrets daily
          Documentation=man:systemd.timer(5)

          [Timer]
          OnCalendar=*-*-* 03:30:00
          Persistent=true
          RandomizedDelaySec=300

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/wordpress-academy-secret-rotate.timer
        mode: '0644'

    - name: Create log file for academy rotation
      ansible.builtin.file:
        path: /var/log/wordpress-academy-secret-rotation.log
        state: touch
        owner: root
        group: root
        mode: '0640'

    - name: Reload systemd daemon after adding academy timer
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable academy secret rotation timer
      ansible.builtin.systemd:
        name: wordpress-academy-secret-rotate.timer
        enabled: true
        state: started

    - name: Create MariaDB root rotation script
      ansible.builtin.copy:
        dest: /usr/local/bin/rotate-mariadb-root.sh
        mode: '0750'
        owner: root
        group: root
        content: |
          #!/bin/bash
          # MariaDB Root Password Rotation Script
          # Managed by Ansible - DO NOT EDIT MANUALLY

          set -euo pipefail

          OPENBAO_ADDR="http://127.0.0.1:8200"
          LOG_FILE="/var/log/mariadb-root-rotation.log"
          TOKEN_FILE="/root/.openbao-mariadb-token"

          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          error_exit() {
              log "ERROR: $1"
              exit 1
          }

          log "Starting MariaDB root password rotation"

          if ! systemctl is-active --quiet openbao; then
              error_exit "OpenBao service is not running"
          fi

          if [ ! -f "$TOKEN_FILE" ]; then
              error_exit "OpenBao token file not found at $TOKEN_FILE"
          fi

          export VAULT_TOKEN
          VAULT_TOKEN=$(cat "$TOKEN_FILE")
          export VAULT_ADDR="$OPENBAO_ADDR"

          # Renew token to avoid expiry during rotation
          bao token renew-self > /dev/null 2>&1 || log "WARN: Token renewal failed, continuing"

          # Read current root password from OpenBao KV
          log "Reading current MariaDB root password from OpenBao"
          OLD_PASS=$(bao kv get -field=root_password secret/mariadb) || error_exit "Failed to read current password from OpenBao"

          # Generate new password (alphanum only - safe for mysqladmin)
          NEW_PASS=$(openssl rand -base64 48 | tr -d '/+=\n' | head -c 32)

          # Update MariaDB root password
          log "Updating MariaDB root password"
          mysqladmin -uroot -p"${OLD_PASS}" password "${NEW_PASS}" || error_exit "Failed to update MariaDB root password"

          # Store new password in OpenBao
          log "Storing new password in OpenBao"
          bao kv patch secret/mariadb root_password="${NEW_PASS}" || error_exit "Failed to store new password in OpenBao"

          # MOTD delivery
          cat > /etc/motd.d/90-rotation-notice <<EOF
          =================================================================
            SECRET ROTATION NOTICE
          =================================================================
            Last rotation : $(date +'%Y-%m-%d %H:%M:%S')

            Retrieve current credentials:
              MariaDB root : bao kv get -field=root_password secret/mariadb
              WP admin     : bao kv get -field=admin_password secret/wordpress

            Dismiss: rm /etc/motd.d/90-rotation-notice
          =================================================================
          EOF

          log "MariaDB root rotation completed successfully"
          exit 0

    - name: Create WordPress admin rotation script
      ansible.builtin.copy:
        dest: /usr/local/bin/rotate-wp-admin.sh
        mode: '0750'
        owner: root
        group: root
        content: |
          #!/bin/bash
          # WordPress Admin Password Rotation Script
          # Managed by Ansible - DO NOT EDIT MANUALLY

          set -euo pipefail

          OPENBAO_ADDR="http://127.0.0.1:8200"
          LOG_FILE="/var/log/wp-admin-rotation.log"
          TOKEN_FILE="/root/.openbao-token"
          WP_PATH="/var/www/twomindstrading.com"

          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          error_exit() {
              log "ERROR: $1"
              exit 1
          }

          log "Starting WordPress admin password rotation"

          if ! systemctl is-active --quiet openbao; then
              error_exit "OpenBao service is not running"
          fi

          if [ ! -f "$TOKEN_FILE" ]; then
              error_exit "OpenBao token file not found at $TOKEN_FILE"
          fi

          export VAULT_TOKEN
          VAULT_TOKEN=$(cat "$TOKEN_FILE")
          export VAULT_ADDR="$OPENBAO_ADDR"

          # Renew token to avoid expiry during rotation
          bao token renew-self > /dev/null 2>&1 || log "WARN: Token renewal failed, continuing"

          # Generate new password
          NEW_PASS=$(openssl rand -base64 48 | tr -d '/+=\n' | head -c 32)

          # Update WordPress admin password by login name (avoids relying on user ID)
          log "Updating WordPress admin password via WP-CLI"
          WP_ADMIN_USER=$(sudo -u www-data wp --path="$WP_PATH" user list --role=administrator \
            --fields=user_login --format=csv | tail -n 1) || error_exit "Failed to get admin username"
          sudo -u www-data wp --path="$WP_PATH" user update "${WP_ADMIN_USER}" \
            --user_pass="${NEW_PASS}" || error_exit "Failed to update WP admin password"

          # Store new password in OpenBao (patch preserves other fields like db_name/db_user)
          log "Storing new password in OpenBao"
          bao kv patch secret/wordpress admin_password="${NEW_PASS}" || error_exit "Failed to store new password in OpenBao"

          # Append/update MOTD so both notices show together
          cat > /etc/motd.d/90-rotation-notice <<EOF
          =================================================================
            SECRET ROTATION NOTICE
          =================================================================
            Last rotation : $(date +'%Y-%m-%d %H:%M:%S')

            Retrieve current credentials:
              MariaDB root : bao kv get -field=root_password secret/mariadb
              WP admin     : bao kv get -field=admin_password secret/wordpress

            Dismiss: rm /etc/motd.d/90-rotation-notice
          =================================================================
          EOF

          log "WordPress admin rotation completed successfully"
          exit 0

    - name: Create academy WordPress admin rotation script
      ansible.builtin.copy:
        dest: /usr/local/bin/rotate-wp-admin-academy.sh
        mode: '0750'
        owner: root
        group: root
        content: |
          #!/bin/bash
          set -euo pipefail

          OPENBAO_ADDR="http://127.0.0.1:8200"
          LOG_FILE="/var/log/wp-admin-academy-rotation.log"
          TOKEN_FILE="/root/.openbao-academy-token"
          WP_PATH="/var/www/academy.twomindstrading.com"

          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
          }

          error_exit() {
              log "ERROR: $1"
              exit 1
          }

          log "Starting WordPress Academy admin password rotation"

          if ! systemctl is-active --quiet openbao; then
              error_exit "OpenBao service is not running"
          fi

          if [ ! -f "$TOKEN_FILE" ]; then
              error_exit "OpenBao token file not found at $TOKEN_FILE"
          fi

          export VAULT_TOKEN
          VAULT_TOKEN=$(cat "$TOKEN_FILE")
          export VAULT_ADDR="$OPENBAO_ADDR"

          bao token renew-self > /dev/null 2>&1 || log "WARN: Token renewal failed, continuing"

          NEW_PASS=$(openssl rand -base64 48 | tr -d '/+=\n' | head -c 32)

          log "Updating WordPress Academy admin password via WP-CLI"
          WP_ADMIN_USER=$(sudo -u www-data wp --path="$WP_PATH" user list --role=administrator \
            --fields=user_login --format=csv | tail -n 1) || error_exit "Failed to get admin username"
          sudo -u www-data wp --path="$WP_PATH" user update "${WP_ADMIN_USER}" \
            --user_pass="${NEW_PASS}" || error_exit "Failed to update WP admin password"

          log "Storing new password in OpenBao"
          bao kv patch secret/wordpress-academy admin_password="${NEW_PASS}" || error_exit "Failed to store new password in OpenBao"

          log "WordPress Academy admin rotation completed successfully"
          exit 0

    - name: Create monthly secret rotation systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/monthly-secret-rotate.service
        mode: '0644'
        content: |
          [Unit]
          Description=Rotate MariaDB root and WordPress admin passwords monthly
          After=network.target openbao.service mariadb.service
          Requires=openbao.service mariadb.service

          [Service]
          Type=oneshot
          User=root
          ExecStart=/usr/local/bin/rotate-mariadb-root.sh
          ExecStart=/usr/local/bin/rotate-wp-admin.sh
          ExecStart=/usr/local/bin/rotate-wp-admin-academy.sh
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=monthly-secret-rotate

          [Install]
          WantedBy=multi-user.target

    - name: Create monthly secret rotation systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/monthly-secret-rotate.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Rotate static secrets monthly (1st of each month at 02:00)
          Documentation=man:systemd.timer(5)

          [Timer]
          OnCalendar=*-*-01 02:00:00
          Persistent=true
          RandomizedDelaySec=300

          [Install]
          WantedBy=timers.target

    - name: Create log files for monthly rotation scripts
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: root
        group: root
        mode: '0640'
      loop:
        - /var/log/mariadb-root-rotation.log
        - /var/log/wp-admin-rotation.log
        - /var/log/wp-admin-academy-rotation.log

    - name: Reload systemd daemon after adding monthly timer
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable monthly secret rotation timer
      ansible.builtin.systemd:
        name: monthly-secret-rotate.timer
        enabled: true
        state: started

    - name: Deploy static credentials MOTD
      ansible.builtin.copy:
        dest: /etc/motd.d/80-credentials
        mode: '0644'
        owner: root
        group: root
        content: |
          =================================================================
            CREDENTIAL RETRIEVAL (requires OpenBao unsealed)
          =================================================================
            export VAULT_ADDR=http://127.0.0.1:8200

            MariaDB root    : bao kv get -field=root_password secret/mariadb
            MariaDB exporter: bao kv get -field=exporter_password secret/mariadb
            WP admin (main) : bao kv get -field=admin_password secret/wordpress
            WP admin (acad) : bao kv get -field=admin_password secret/wordpress-academy
            Grafana admin   : bao kv get -field=admin_password secret/grafana
            SMTP (if configured)   : bao kv get secret/smtp
            Stripe (if configured) : bao kv get secret/stripe
            Backup S3       : bao kv get secret/backup
          =================================================================

    - name: Display manual steps required for already-running servers
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "  MANUAL STEPS REQUIRED (running server) "
          - "=========================================="
          - ""
          - "--- WORDPRESS DB ROTATION (existing) ---"
          - "1. Place wordpress-rotator token:"
          - "   echo '<token>' > /root/.openbao-token && chmod 600 /root/.openbao-token"
          - ""
          - "--- MARIADB ROOT + WP ADMIN ROTATION (new) ---"
          - "2. Login to OpenBao with admin credentials:"
          - "   export VAULT_ADDR=http://127.0.0.1:8200"
          - "   bao login -method=userpass username=admin"
          - ""
          - "3. Update wordpress-rotator policy (add KV write):"
          - "   bao policy write wordpress-rotator - <<'EOF'"
          - "   path \"database/creds/wordpress\" { capabilities = [\"read\"] }"
          - "   path \"secret/data/wordpress\"    { capabilities = [\"create\", \"update\"] }"
          - "   path \"auth/token/renew-self\"    { capabilities = [\"update\"] }"
          - "   EOF"
          - ""
          - "4. Create mariadb-rotator policy:"
          - "   bao policy write mariadb-rotator - <<'EOF'"
          - "   path \"secret/data/mariadb\"   { capabilities = [\"read\", \"create\", \"update\"] }"
          - "   path \"auth/token/renew-self\" { capabilities = [\"update\"] }"
          - "   EOF"
          - ""
          - "5. Create mariadb-rotator token (save the output):"
          - "   bao token create -orphan -period=2160h -policy=mariadb-rotator -format=json \\"
          - "     | jq -r '.auth.client_token' | tee /root/.openbao-mariadb-token"
          - "   chmod 600 /root/.openbao-mariadb-token"
          - ""
          - "6. Seed WP admin password into OpenBao KV:"
          - "   bao kv patch secret/wordpress admin_password='<current-wp-admin-pass>'"
          - "   (retrieve current pass from wp-admin or wp-config.php first)"
          - ""
          - "--- BACKUP TOKEN (new) ---"
          - "6b. Seed backup credentials in OpenBao (if not done in bootstrap):"
          - "    bao kv put secret/backup \\"
          - "      s3_access_key='<key>' \\"
          - "      s3_secret_key='<secret>' \\"
          - "      encryption_passphrase='<passphrase>'"
          - ""
          - "6c. Create backup-reader policy:"
          - "    bao policy write backup-reader - <<'EOF'"
          - "    path \"secret/data/backup\"  { capabilities = [\"read\"] }"
          - "    path \"secret/data/mariadb\" { capabilities = [\"read\"] }"
          - "    path \"auth/token/renew-self\" { capabilities = [\"update\"] }"
          - "    EOF"
          - ""
          - "6d. Create backup-reader token:"
          - "    bao token create -orphan -period=2160h -policy=backup-reader -format=json \\"
          - "      | jq -r '.auth.client_token' | tee /root/.openbao-backup-token"
          - "    chmod 600 /root/.openbao-backup-token"
          - ""
          - "--- VERIFICATION ---"
          - "7. Test MariaDB rotation:"
          - "   sudo /usr/local/bin/rotate-mariadb-root.sh"
          - "   mysql -uroot -p$(bao kv get -field=root_password secret/mariadb) -e 'SELECT 1;'"
          - ""
          - "8. Test WP admin rotation:"
          - "   sudo /usr/local/bin/rotate-wp-admin.sh"
          - "   cat /etc/motd.d/90-rotation-notice"
          - ""
          - "9. Check monthly timer:"
          - "   systemctl list-timers monthly-secret-rotate.timer"
          - ""
          - "--- ACADEMY ROTATION ---"
          - "10. Place wordpress-academy-rotator token:"
          - "   echo '<token>' > /root/.openbao-academy-token && chmod 600 /root/.openbao-academy-token"
          - "   (token value from bootstrap output or: bao token create -orphan -period=2160h -policy=wordpress-academy-rotator)"
          - ""
          - "11. Test Academy DB rotation:"
          - "   sudo /usr/local/bin/rotate-wordpress-academy-secrets.sh"
          - ""
          - "12. Test Academy WP admin rotation:"
          - "   sudo /usr/local/bin/rotate-wp-admin-academy.sh"
          - ""
          - "13. Check academy timer:"
          - "   systemctl list-timers wordpress-academy-secret-rotate.timer"
          - "=========================================="
