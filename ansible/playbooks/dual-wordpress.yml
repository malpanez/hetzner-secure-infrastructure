---
- name: Deploy dual WordPress application stack
  hosts: wordpress_servers
  become: true
  gather_facts: true

  roles:
    - role: geerlingguy.mysql
      tags: [wordpress, database, mariadb]
      vars:
        mysql_databases:
          - name: wordpress_main
            encoding: utf8mb4
            collation: utf8mb4_unicode_ci
          - name: wordpress_academy
            encoding: utf8mb4
            collation: utf8mb4_unicode_ci
        mysql_users:
          - name: wp_main
            host: localhost
            password: "{{ vault_wp_main_db_password }}"
            priv: "wordpress_main.*:ALL"
          - name: wp_academy
            host: localhost
            password: "{{ vault_wp_academy_db_password }}"
            priv: "wordpress_academy.*:ALL"
      when: deploy_mariadb | default(true) | bool

    - role: valkey
      tags: [wordpress, redis, cache, performance]
      when: deploy_valkey | default(true) | bool

  tasks:
    - name: Deploy main site (twomindstrading.com)
      ansible.builtin.include_role:
        name: nginx_wordpress
      vars:
        nginx_wordpress_site_name: main
        nginx_wordpress_server_name: twomindstrading.com
        nginx_wordpress_server_aliases:
          - www.twomindstrading.com
        nginx_wordpress_web_root: /var/www/twomindstrading.com
        nginx_wordpress_db_name: wordpress_main
        nginx_wordpress_db_user: wp_main
        nginx_wordpress_db_password: "{{ vault_wp_main_db_password }}"
        nginx_wordpress_php_fpm_max_children: 20
        nginx_wordpress_php_fpm_start_servers: 5
        nginx_wordpress_php_fpm_min_spare_servers: 3
        nginx_wordpress_php_fpm_max_spare_servers: 8
        nginx_wordpress_admin_user: tmt_admin
        nginx_wordpress_learndash_enabled: false
        nginx_wordpress_woocommerce_enabled: false
        nginx_wordpress_redis_database: 0
        nginx_wordpress_redis_prefix: "wp_main_"
        # Migrating existing design from Elementor to Kadence — no starter template
        nginx_wordpress_starter_template_import: false
        # eCommerce not needed on main site (marketing only — links to academy)
        nginx_wordpress_plugins_ecommerce: []
        nginx_wordpress_auth_key: "{{ vault_nginx_wordpress_auth_key }}"
        nginx_wordpress_secure_auth_key: "{{ vault_nginx_wordpress_secure_auth_key }}"
        nginx_wordpress_logged_in_key: "{{ vault_nginx_wordpress_logged_in_key }}"
        nginx_wordpress_nonce_key: "{{ vault_nginx_wordpress_nonce_key }}"
        nginx_wordpress_auth_salt: "{{ vault_nginx_wordpress_auth_salt }}"
        nginx_wordpress_secure_auth_salt: "{{ vault_nginx_wordpress_secure_auth_salt }}"
        nginx_wordpress_logged_in_salt: "{{ vault_nginx_wordpress_logged_in_salt }}"
        nginx_wordpress_nonce_salt: "{{ vault_nginx_wordpress_nonce_salt }}"
        nginx_wordpress_content_pages:
          - {slug: homepage, wp_current_slug: homepage-v2-4}
          - {slug: cursos}
          - {slug: metodologia}
          - {slug: instructores}
          - {slug: contacto}
          - {slug: sobre-nosotros}
          - {slug: equipo, wp_current_slug: equipo-2}
          - {slug: aviso-de-riesgo}
          - {slug: politica-de-cookies}
          - {slug: politica-de-privacidad}
      tags: [wordpress, nginx, webserver, main]

    - name: Deploy academy site (academy.twomindstrading.com)
      ansible.builtin.include_role:
        name: nginx_wordpress
      vars:
        nginx_wordpress_site_name: academy
        nginx_wordpress_install_nginx: false
        nginx_wordpress_install_php: false
        nginx_wordpress_server_name: academy.twomindstrading.com
        nginx_wordpress_server_aliases: []
        nginx_wordpress_web_root: /var/www/academy.twomindstrading.com
        nginx_wordpress_db_name: wordpress_academy
        nginx_wordpress_db_user: wp_academy
        nginx_wordpress_db_password: "{{ vault_wp_academy_db_password }}"
        nginx_wordpress_php_fpm_max_children: 30
        nginx_wordpress_php_fpm_start_servers: 8
        nginx_wordpress_php_fpm_min_spare_servers: 4
        nginx_wordpress_php_fpm_max_spare_servers: 12
        nginx_wordpress_admin_user: tmt_admin
        nginx_wordpress_admin_password: "{{ vault_wordpress_academy_admin_password }}"
        nginx_wordpress_learndash_enabled: true
        nginx_wordpress_woocommerce_enabled: false
        nginx_wordpress_letsencrypt_enabled: true
        nginx_wordpress_letsencrypt_domains:
          - academy.twomindstrading.com
        nginx_wordpress_letsencrypt_cloudflare_api_token: "{{ vault_cloudflare_api_token }}"
        nginx_wordpress_ssl_cert_path: "/etc/letsencrypt/live/academy.twomindstrading.com/fullchain.pem"
        nginx_wordpress_ssl_key_path: "/etc/letsencrypt/live/academy.twomindstrading.com/privkey.pem"
        nginx_wordpress_redis_database: 1
        nginx_wordpress_redis_prefix: "wp_academy_"
        # Import Business Courses starter template (clean base for LearnDash)
        nginx_wordpress_starter_template_import: true
        nginx_wordpress_starter_template_name: "Business Courses"
        # Payments: LearnDash built-in Stripe (one-time $1000+ per course — no SureCart needed)
        # Videos: Infoprotector embeds in lesson content (no Presto Player needed)
        nginx_wordpress_auth_key: "{{ vault_wp_academy_auth_key }}"
        nginx_wordpress_secure_auth_key: "{{ vault_wp_academy_secure_auth_key }}"
        nginx_wordpress_logged_in_key: "{{ vault_wp_academy_logged_in_key }}"
        nginx_wordpress_nonce_key: "{{ vault_wp_academy_nonce_key }}"
        nginx_wordpress_auth_salt: "{{ vault_wp_academy_auth_salt }}"
        nginx_wordpress_secure_auth_salt: "{{ vault_wp_academy_secure_auth_salt }}"
        nginx_wordpress_logged_in_salt: "{{ vault_wp_academy_logged_in_salt }}"
        nginx_wordpress_nonce_salt: "{{ vault_wp_academy_nonce_salt }}"
      tags: [wordpress, nginx, webserver, academy]

  post_tasks:
    - name: Display dual WordPress deployment information
      ansible.builtin.debug:
        msg: |-
          ========================================
          Dual WordPress Stack Deployed
          ========================================

          Server: {{ inventory_hostname }}
          IP: {{ ansible_host }}

          Main site:    https://twomindstrading.com
          Academy site: https://academy.twomindstrading.com

          Databases:
            wordpress_main    → user: wp_main
            wordpress_academy → user: wp_academy

          PHP-FPM pools:
            main:    max_children=20, socket=fpm-main.sock
            academy: max_children=30, socket=fpm-academy.sock

          Valkey:
            main:    db=0, prefix=wp_main_
            academy: db=1, prefix=wp_academy_

          Next steps:
          1. Configure Cloudflare DNS for academy subdomain
          2. Install WordPress on each site via wp-admin
          3. Install LearnDash Pro manually on academy (license required)
          4. Configure UpdraftPlus on both sites

          ========================================
      tags: [wordpress, info]
