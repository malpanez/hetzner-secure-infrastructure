---
- name: Converge
  hosts: all
  become: true

  vars:
    # Disable transit for molecule tests (don't need auto-unseal in CI)
    openbao_transit_instance_enabled: false
    openbao_transit_enabled: false
    # Disable the primary transit-wait ExecStartPre gate: the throwaway container
    # runs bao sealed and never unseals the transit, so the gate would hang the
    # start until TimeoutStartSec.
    openbao_primary_transit_gate: false

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

  roles:
    - role: openbao
