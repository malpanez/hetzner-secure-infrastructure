---
# OpenBao Role - Service Management Tasks

- name: OpenBao | Service | Deploy OpenBao systemd service
  ansible.builtin.template:
    src: openbao.service.j2
    dest: /etc/systemd/system/openbao.service
    owner: root
    group: root
    mode: "0644"
  notify: restart openbao
  register: openbao_systemd_unit
  tags: [openbao, systemd]

- name: OpenBao | Service | Assert systemd unit deployed
  ansible.builtin.assert:
    that:
      - openbao_systemd_unit is succeeded
    success_msg: "OpenBao systemd service unit deployed"
    fail_msg: "Failed to deploy OpenBao systemd service unit"
  tags: [openbao, systemd]

- name: OpenBao | Service | Deploy transit-wait gate script
  ansible.builtin.copy:
    src: openbao-wait-transit.sh
    dest: /usr/local/bin/openbao-wait-transit.sh
    owner: root
    group: root
    mode: "0755"
  when: openbao_primary_transit_gate | default(true) | bool
  tags: [openbao, systemd]

- name: OpenBao | Service | Ensure primary drop-in dir exists
  ansible.builtin.file:
    path: /etc/systemd/system/openbao.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: openbao_primary_transit_gate | default(true) | bool
  tags: [openbao, systemd]

- name: OpenBao | Service | Deploy transit-wait ExecStartPre drop-in
  # Gates the primary on the transit being UNSEALED so a boot with a still-sealed
  # transit waits in start-pre instead of burning the bounded start-limit in
  # 99-selfheal.conf -> no manual `reset-failed && start` after a reboot.
  # Disabled (openbao_primary_transit_gate=false) in molecule: the throwaway
  # container runs bao sealed and never unseals the transit, so the gate would
  # hang the start until TimeoutStartSec.
  ansible.builtin.copy:
    src: openbao-50-wait-transit.conf
    dest: /etc/systemd/system/openbao.service.d/50-wait-transit.conf
    owner: root
    group: root
    mode: "0644"
  when: openbao_primary_transit_gate | default(true) | bool
  notify: reload systemd
  tags: [openbao, systemd]

- name: OpenBao | Service | Enable and start OpenBao service
  ansible.builtin.systemd:
    name: openbao
    enabled: true
    state: started
    daemon_reload: true
  register: openbao_service_started
  tags: [openbao, service]

- name: OpenBao | Service | Assert OpenBao service started
  ansible.builtin.assert:
    that:
      - openbao_service_started is succeeded
    success_msg: "OpenBao service started and enabled"
    fail_msg: "Failed to start OpenBao service"
  tags: [openbao, service]
