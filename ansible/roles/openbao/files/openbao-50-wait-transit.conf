# Ansible managed
# TMT: gate the primary's start on the transit (auto-unseal source) being UNSEALED.
# See /usr/local/bin/openbao-wait-transit.sh. The wait runs in start-pre (NOT a crash),
# so it neither consumes the bounded start-limit in 99-selfheal.conf nor trips the
# crash-loop alert. This removes the manual `reset-failed && start` after every reboot:
# unseal the transit and the primary completes start on its own.
[Unit]
After=openbao-transit.service

[Service]
ExecStartPre=/usr/local/bin/openbao-wait-transit.sh
TimeoutStartSec=1800
