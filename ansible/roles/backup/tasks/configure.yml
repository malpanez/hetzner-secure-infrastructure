---
- name: Backup | Configure | Create staging directory
  ansible.builtin.file:
    path: "{{ backup_staging_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [backup, configure]

- name: Backup | Configure | Create log file
  ansible.builtin.file:
    path: "{{ backup_log_file }}"
    state: touch
    owner: root
    group: root
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  tags: [backup, configure]

- name: Backup | Configure | Deploy backup script
  ansible.builtin.template:
    src: backup.sh.j2
    dest: "{{ backup_script_path }}"
    owner: root
    group: root
    mode: "0700"
  tags: [backup, configure]
