---
# Grype Role - Default Variables

grype_version: "0.88.0"
grype_install_dir: /usr/local/bin
grype_binary: "{{ grype_install_dir }}/grype"

# DB cache location (writable by root, used by scheduled scans)
grype_db_dir: /var/lib/grype

# Scan configuration
grype_severity_fail: high
grype_output_format: table

# Scheduled DB update (cron)
grype_db_update_enabled: true
grype_db_update_hour: "3"
grype_db_update_minute: "30"
