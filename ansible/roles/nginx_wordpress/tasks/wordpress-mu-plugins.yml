---
# Nginx WordPress Role - WordPress MU-Plugins (must-use)
#
# Deploys must-use plugins listed in nginx_wordpress_mu_plugins_shared (all
# sites) and nginx_wordpress_mu_plugins (per-site). Each entry is a file path
# resolvable by the ansible.builtin.copy `src` lookup (role files/, playbook
# files/, or an absolute path), so consuming projects ship their own
# mu-plugins without modifying this role.

- name: Nginx WordPress | MU-Plugins | Check if WordPress is installed
  ansible.builtin.stat:
    path: "{{ nginx_wordpress_web_root }}/wp-config.php"
  register: nginx_wordpress_wp_config_check
  tags: [nginx-wordpress, wordpress, mu-plugins]

- name: Nginx WordPress | MU-Plugins | Ensure mu-plugins directory exists
  ansible.builtin.file:
    path: "{{ nginx_wordpress_web_root }}/wp-content/mu-plugins"
    state: directory
    owner: "{{ nginx_wordpress_nginx_user }}"
    group: "{{ nginx_wordpress_nginx_group }}"
    mode: "0755"
  when: nginx_wordpress_wp_config_check.stat.exists
  tags: [nginx-wordpress, wordpress, mu-plugins]

- name: Nginx WordPress | MU-Plugins | Deploy plugins
  tags: [nginx-wordpress, wordpress, mu-plugins]
  module_defaults:
    ansible.builtin.copy:
      owner: "{{ nginx_wordpress_nginx_user }}"
      group: "{{ nginx_wordpress_nginx_group }}"
      mode: "0644"
  block:
    - name: Nginx WordPress | MU-Plugins | Deploy shared plugins (all sites)
      ansible.builtin.copy:  # noqa: risky-file-permissions
        src: "{{ item }}"
        dest: "{{ nginx_wordpress_web_root }}/wp-content/mu-plugins/{{ item | basename }}"
      loop: "{{ nginx_wordpress_mu_plugins_shared }}"
      when: nginx_wordpress_wp_config_check.stat.exists

    - name: Nginx WordPress | MU-Plugins | Deploy site-specific plugins
      ansible.builtin.copy:  # noqa: risky-file-permissions
        src: "{{ item }}"
        dest: "{{ nginx_wordpress_web_root }}/wp-content/mu-plugins/{{ item | basename }}"
      loop: "{{ nginx_wordpress_mu_plugins }}"
      when: nginx_wordpress_wp_config_check.stat.exists

    # Serve files outside the docroot via an authenticated endpoint: an
    # mu-plugin reads from this directory and streams content to authorized
    # users while nginx never exposes it directly.
    - name: Nginx WordPress | MU-Plugins | Ensure protected materials dir (outside docroot)
      ansible.builtin.file:
        path: "{{ nginx_wordpress_protected_dir }}"
        state: directory
        owner: "{{ nginx_wordpress_nginx_user }}"
        group: "{{ nginx_wordpress_nginx_group }}"
        mode: "0750"
      when:
        - nginx_wordpress_wp_config_check.stat.exists
        - nginx_wordpress_protected_dir | length > 0
