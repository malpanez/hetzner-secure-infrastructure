---
# Nginx WordPress Role - WordPress MU-Plugins (must-use)

- name: Nginx WordPress | MU-Plugins | Check if WordPress is installed
  ansible.builtin.stat:
    path: "{{ nginx_wordpress_web_root }}/wp-config.php"
  register: wp_config_check
  tags: [nginx-wordpress, wordpress, mu-plugins]

- name: Nginx WordPress | MU-Plugins | Ensure mu-plugins directory exists
  ansible.builtin.file:
    path: "{{ nginx_wordpress_web_root }}/wp-content/mu-plugins"
    state: directory
    owner: "{{ nginx_wordpress_nginx_user }}"
    group: "{{ nginx_wordpress_nginx_group }}"
    mode: "0755"
  when: wp_config_check.stat.exists
  tags: [nginx-wordpress, wordpress, mu-plugins]

- name: Nginx WordPress | MU-Plugins | Deploy plugins
  tags: [nginx-wordpress, wordpress, mu-plugins]
  module_defaults:
    ansible.builtin.copy:
      owner: "{{ nginx_wordpress_nginx_user }}"
      group: "{{ nginx_wordpress_nginx_group }}"
      mode: "0644"
  block:
    - name: Nginx WordPress | MU-Plugins | Deploy shared plugins (all sites)
      ansible.builtin.copy:  # noqa: risky-file-permissions
        src: "{{ item }}"
        dest: "{{ nginx_wordpress_web_root }}/wp-content/mu-plugins/{{ item }}"
      loop:
        - tmt-perf.php
        - force-gd.php
      when: wp_config_check.stat.exists

    - name: Nginx WordPress | MU-Plugins | Deploy academy plugins
      ansible.builtin.copy:  # noqa: risky-file-permissions
        src: "{{ item }}"
        dest: "{{ nginx_wordpress_web_root }}/wp-content/mu-plugins/{{ item | basename }}"
      loop:
        - academy/tmt-academy.php
        - academy/tmt-access-control.php
        - academy/tmt-seed-curso1.php
      when:
        - wp_config_check.stat.exists
        - nginx_wordpress_site_name | default('') == 'academy'
