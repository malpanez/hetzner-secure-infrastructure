---
# Nginx WordPress Role - WordPress Plugins Installation

- name: Nginx WordPress | Plugins | Check if WordPress is installed
  ansible.builtin.stat:
    path: "{{ nginx_wordpress_web_root }}/wp-config.php"
  register: nginx_wordpress_wp_config_check
  tags: [nginx-wordpress, wordpress, plugins]

# ========================================
# Remove Bloat Plugins
# ========================================

- name: Nginx WordPress | Plugins | Remove bloat plugins
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin delete {{ item }}
      --path={{ nginx_wordpress_web_root }}
  become_user: "{{ nginx_wordpress_nginx_user }}"
  loop: "{{ nginx_wordpress_plugins_remove | default([]) }}"
  register: nginx_wordpress_plugin_remove
  changed_when: "'Deleted' in nginx_wordpress_plugin_remove.stdout"
  failed_when: false
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_plugins_remove is defined
    - nginx_wordpress_plugins_remove | length > 0
  tags: [nginx-wordpress, wordpress, plugins, cleanup, molecule-notest]

# ========================================
# Install Plugin Groups
# ========================================

- name: Nginx WordPress | Plugins | Install mandatory infrastructure plugins
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin install
      {{ nginx_wordpress_plugins_mandatory | join(' ') }} --activate
      --path={{ nginx_wordpress_web_root }}
  become_user: "{{ nginx_wordpress_nginx_user }}"
  register: nginx_wordpress_plugin_install
  changed_when: "'Installing' in nginx_wordpress_plugin_install.stdout"
  failed_when: false
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_plugins_mandatory | default([]) | length > 0
  tags: [nginx-wordpress, wordpress, plugins, molecule-notest]

- name: Nginx WordPress | Plugins | Install operations plugins
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin install
      {{ nginx_wordpress_plugins_operations | join(' ') }} --activate
      --path={{ nginx_wordpress_web_root }}
  become_user: "{{ nginx_wordpress_nginx_user }}"
  register: nginx_wordpress_operations_plugin_install
  changed_when: "'Installing' in nginx_wordpress_operations_plugin_install.stdout"
  failed_when: false
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_plugins_operations | default([]) | length > 0
  tags: [nginx-wordpress, wordpress, plugins, molecule-notest]

- name: Nginx WordPress | Plugins | Install design plugins
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin install
      {{ nginx_wordpress_plugins_design | join(' ') }} --activate
      --path={{ nginx_wordpress_web_root }}
  become_user: "{{ nginx_wordpress_nginx_user }}"
  register: nginx_wordpress_design_plugin_install
  changed_when: "'Installing' in nginx_wordpress_design_plugin_install.stdout"
  failed_when: false
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_plugins_design | default([]) | length > 0
  tags: [nginx-wordpress, wordpress, plugins, molecule-notest]

- name: Nginx WordPress | Plugins | Install forms plugins
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin install
      {{ nginx_wordpress_plugins_forms | join(' ') }} --activate
      --path={{ nginx_wordpress_web_root }}
  become_user: "{{ nginx_wordpress_nginx_user }}"
  register: nginx_wordpress_forms_plugin_install
  changed_when: "'Installing' in nginx_wordpress_forms_plugin_install.stdout"
  failed_when: false
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_plugins_forms | default([]) | length > 0
  tags: [nginx-wordpress, wordpress, plugins, molecule-notest]

- name: Nginx WordPress | Plugins | Install accessibility plugins
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin install
      {{ nginx_wordpress_plugins_accessibility | join(' ') }} --activate
      --path={{ nginx_wordpress_web_root }}
  become_user: "{{ nginx_wordpress_nginx_user }}"
  register: nginx_wordpress_accessibility_plugin_install
  changed_when: "'Installing' in nginx_wordpress_accessibility_plugin_install.stdout"
  failed_when: false
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_plugins_accessibility | default([]) | length > 0
  tags: [nginx-wordpress, wordpress, plugins, molecule-notest]

# ========================================
# Display Installed Plugins
# ========================================

- name: Nginx WordPress | Plugins | Check plugin installation status
  ansible.builtin.command:
    cmd: >-
      {{ nginx_wordpress_wpcli_path }} plugin list
      --path={{ nginx_wordpress_web_root }} --format=json
  become_user: "{{ nginx_wordpress_nginx_user }}"
  register: nginx_wordpress_installed_plugins
  changed_when: false
  when: nginx_wordpress_wp_config_check.stat.exists
  tags: [nginx-wordpress, wordpress, plugins, molecule-notest]

- name: Nginx WordPress | Plugins | Display installed plugins summary
  ansible.builtin.debug:
    msg: "{{ ['========================================',
             'WordPress Plugins — ' + nginx_wordpress_site_name | upper + ' site',
             '========================================',
             '',
             'Mandatory: ' + (nginx_wordpress_plugins_mandatory | default([]) | join(', ')),
             'Operations: ' + (nginx_wordpress_plugins_operations | default([]) | join(', ')),
             'Design: ' + (nginx_wordpress_plugins_design | default([]) | join(', ')),
             'Forms: ' + (nginx_wordpress_plugins_forms | default([]) | join(', ')),
             'Accessibility: ' + (nginx_wordpress_plugins_accessibility | default([]) | join(', ')),
             'Removed: ' + (nginx_wordpress_plugins_remove | default([]) | join(', ')),
             '',
             'Commercial plugins (license required) install via',
             'nginx_wordpress_plugins_zip — see wordpress-plugins-zip.yml.',
             '========================================'] }}"
  when:
    - nginx_wordpress_wp_config_check.stat.exists
    - nginx_wordpress_installed_plugins.stdout is defined
  tags: [nginx-wordpress, wordpress, plugins, info]

# ========================================
# Configure Plugins
# ========================================

- name: Nginx WordPress | Plugins | Configure Redis Object Cache
  block:
    - name: Nginx WordPress | Plugins | Check if Redis/Valkey is running
      ansible.builtin.systemd:
        name: valkey
      register: nginx_wordpress_valkey_status
      failed_when: false
      changed_when: false

    - name: Nginx WordPress | Plugins | Enable Redis Object Cache
      ansible.builtin.command:
        cmd: >-
          {{ nginx_wordpress_wpcli_path }} redis enable
          --path={{ nginx_wordpress_web_root }}
      become_user: "{{ nginx_wordpress_nginx_user }}"
      when: nginx_wordpress_valkey_status.status.ActiveState == 'active'
      register: nginx_wordpress_redis_enable
      changed_when: "'already enabled' not in nginx_wordpress_redis_enable.stdout"
      failed_when: false

    - name: Nginx WordPress | Plugins | Display Redis cache status
      ansible.builtin.debug:
        msg: >-
          Redis Object Cache:
          {{ 'ENABLED ✓' if nginx_wordpress_valkey_status.status.ActiveState == 'active'
             else 'DISABLED (Valkey not running)' }}
  when: nginx_wordpress_wp_config_check.stat.exists
  tags: [nginx-wordpress, wordpress, plugins, redis]

- name: Nginx WordPress | Plugins | Configure Nginx Helper
  block:
    - name: Nginx WordPress | Plugins | Enable Nginx Helper purge on update
      ansible.builtin.command:
        cmd: >-
          {{ nginx_wordpress_wpcli_path }} option update rt_wp_nginx_helper_options
          '{{ nginx_helper_options | to_json }}' --format=json
          --path={{ nginx_wordpress_web_root }}
      become_user: "{{ nginx_wordpress_nginx_user }}"
      vars:
        nginx_helper_options:
          enable_purge: "1"
          cache_method: "enable_fastcgi"
          purge_method: "delete_local_server"
          enable_map: "0"
          enable_log: "0"
          enable_stamp: "0"
      register: nginx_wordpress_nginx_helper_config
      changed_when: nginx_wordpress_nginx_helper_config.rc == 0
      failed_when: false

    - name: Nginx WordPress | Plugins | Display Nginx Helper status
      ansible.builtin.debug:
        msg: "Nginx Helper: FastCGI cache purging ENABLED ✓"
  when: nginx_wordpress_wp_config_check.stat.exists
  tags: [nginx-wordpress, wordpress, plugins, cache]

# ========================================
# Post-Installation Instructions
# ========================================

- name: Nginx WordPress | Plugins | Post-installation instructions
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "Post-Install Checklist — {{ nginx_wordpress_site_name | upper }} site"
      - "============================================"
      - ""
      - "AUTO-CONFIGURED (no action needed):"
      - "  - Redis Object Cache connected to Valkey"
      - "  - Nginx Helper FastCGI cache purging"
      - ""
      - "CONFIGURE MANUALLY:"
      - "  1. Email (WP Mail SMTP): point it at your SMTP provider"
      - "  2. SEO (Rank Math): Setup Wizard, connect Search Console"
      - "  3. 2FA (Wordfence): Login Security, set up TOTP, enforce for admins"
      - "  4. GDPR (Cookie Notice): customize colors to match brand"
      - ""
      - "Commercial plugins (license required): upload the ZIPs via"
      - "nginx_wordpress_plugins_zip or wp-admin -> Plugins -> Upload."
      - "============================================"
  when: nginx_wordpress_wp_config_check.stat.exists
  run_once: true
  tags: [nginx-wordpress, wordpress, plugins, info]
