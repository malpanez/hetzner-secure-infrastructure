---
- name: Nginx WordPress | Permissions | Set ownership and permissions recursively
  ansible.builtin.file:
    path: "{{ nginx_wordpress_web_root }}"
    owner: "{{ nginx_wordpress_nginx_user }}"
    group: "{{ nginx_wordpress_nginx_group }}"
    mode: u=rwX,g=rX,o=rX
    recurse: true
  tags: [nginx-wordpress, wordpress, permissions, molecule-notest]

- name: Nginx WordPress | Permissions | Secure wp-config.php
  ansible.builtin.file:
    path: "{{ nginx_wordpress_web_root }}/wp-config.php"
    owner: root
    group: "{{ nginx_wordpress_nginx_group }}"
    mode: '0640'
  tags: [nginx-wordpress, wordpress, permissions, molecule-notest]
