---
# Nginx WordPress Role - WordPress Page Content Deployment
# Updates existing page content via WP-CLI from exported HTML files.
# Only runs when nginx_wordpress_content_pages is non-empty.

- name: Nginx WordPress | Content | Check if WordPress is installed
  ansible.builtin.stat:
    path: "{{ nginx_wordpress_web_root }}/wp-config.php"
  register: wp_config_check
  tags: [nginx-wordpress, wordpress, content]

- name: Nginx WordPress | Content | Copy page HTML files to server
  ansible.builtin.copy:
    src: "pages/tmt-page-{{ item.slug }}.html"
    dest: "/tmp/tmt-pages/tmt-page-{{ item.slug }}.html"
    owner: "{{ nginx_wordpress_nginx_user }}"
    group: "{{ nginx_wordpress_nginx_group }}"
    mode: "0644"
  loop: "{{ nginx_wordpress_content_pages }}"
  when:
    - wp_config_check.stat.exists
    - nginx_wordpress_content_pages | length > 0
  tags: [nginx-wordpress, wordpress, content, molecule-notest]

- name: Nginx WordPress | Content | Update page content via WP-CLI
  ansible.builtin.shell: |
    set -euo pipefail
    POST_ID=$({{ nginx_wordpress_wpcli_path }} post list \
      --post_type=page \
      --name={{ item.slug }} \
      --field=ID \
      --path={{ nginx_wordpress_web_root }} \
      --format=ids)
    if [ -z "$POST_ID" ]; then
      echo "SKIP: page '{{ item.slug }}' not found"
      exit 0
    fi
    {{ nginx_wordpress_wpcli_path }} post update "$POST_ID" \
      --post_content="$(cat /tmp/tmt-pages/tmt-page-{{ item.slug }}.html)" \
      --path={{ nginx_wordpress_web_root }}
  args:
    executable: /bin/bash
  become_user: "{{ nginx_wordpress_nginx_user }}"
  loop: "{{ nginx_wordpress_content_pages }}"
  changed_when: true
  failed_when: false
  when:
    - wp_config_check.stat.exists
    - nginx_wordpress_content_pages | length > 0
  tags: [nginx-wordpress, wordpress, content, molecule-notest]

- name: Nginx WordPress | Content | Remove temporary page files
  ansible.builtin.file:
    path: /tmp/tmt-pages
    state: absent
  when:
    - wp_config_check.stat.exists
    - nginx_wordpress_content_pages | length > 0
  tags: [nginx-wordpress, wordpress, content, molecule-notest]
