---
# AppArmor Role - Configuration Tasks

# NOTE: AppArmor GRUB configuration removed - NOT needed on Debian 13
# AppArmor is enabled by default since Debian 10
# Source: https://wiki.debian.org/AppArmor/HowToUse
# No kernel parameters required

- name: AppArmor | Configure | Deploy profiles and monitoring
  module_defaults:
    ansible.builtin.file:
      owner: root
      group: root
    ansible.builtin.template:
      owner: root
      group: root
      mode: '0644'
    ansible.builtin.copy:
      owner: root
      group: root
      mode: '0644'
  block:
    - name: AppArmor | Configure | Create custom profiles directory
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ apparmor_local_dir }}"
        state: directory
        mode: '0755'
      tags: [apparmor, profiles, config]

    - name: AppArmor | Configure | Deploy custom AppArmor profile for SSH
      ansible.builtin.template:  # noqa: risky-file-permissions
        src: apparmor.d/usr.sbin.sshd.j2
        dest: "{{ apparmor_profiles_dir }}/usr.sbin.sshd"
      notify: reload apparmor profiles
      tags: [apparmor, profiles, ssh, config]

    - name: AppArmor | Configure | Deploy custom AppArmor profile for Fail2ban
      ansible.builtin.template:  # noqa: risky-file-permissions
        src: apparmor.d/usr.bin.fail2ban-server.j2
        dest: "{{ apparmor_profiles_dir }}/usr.bin.fail2ban-server"
      notify: reload apparmor profiles
      when: apparmor_enable_fail2ban_profile
      tags: [apparmor, profiles, fail2ban, config]

    - name: AppArmor | Configure | Create local override stubs for managed profiles
      ansible.builtin.file:  # noqa: risky-file-permissions
        path: "{{ apparmor_local_dir }}/{{ item }}"
        state: touch
        mode: '0644'
        modification_time: preserve
        access_time: preserve
      loop: "{{ apparmor_local_stubs | default(['usr.sbin.sshd', 'usr.bin.fail2ban-server']) }}"
      tags: [apparmor, profiles, config]

    - name: AppArmor | Configure | Deploy php-fpm local override (allow /var/www access)
      ansible.builtin.copy:  # noqa: risky-file-permissions
        dest: "{{ apparmor_local_dir }}/php-fpm"
        content: |
          # Managed by Ansible - allow PHP-FPM to serve WordPress files
          /var/www/** r,
          /var/www/**/wp-content/uploads/** rw,
          /var/www/**/wp-content/cache/** rw,
          /var/www/**/wp-content/upgrade/** rw,
          /var/www/**/wp-content/upgrade-temp-backup/** rw,
          /var/www/**/wp-content/plugins/** rw,
          /var/www/**/wp-content/themes/** r,
          /var/www/**/wp-content/mu-plugins/** r,
          /tmp/ rw,
          /tmp/** rw,
      notify: reload apparmor profiles
      tags: [apparmor, profiles, php-fpm, config]

    - name: AppArmor | Configure | Create AppArmor monitoring script
      ansible.builtin.template:  # noqa: risky-file-permissions
        src: aa-monitor.sh.j2
        dest: /usr/local/bin/aa-monitor
        mode: '0755'
      when: apparmor_monitoring_enabled
      tags: [apparmor, monitoring, config]

    - name: AppArmor | Configure | Configure AppArmor log rotation
      ansible.builtin.template:  # noqa: risky-file-permissions
        src: apparmor-logrotate.j2
        dest: /etc/logrotate.d/apparmor
      when: apparmor_logrotate_enabled
      tags: [apparmor, logging, config]

- name: AppArmor | Configure | Load AppArmor profiles
  ansible.builtin.command: "{{ apparmor_parser_command }} -r {{ apparmor_profiles_dir }}/{{ item }}"
  loop:
    - usr.sbin.sshd
    - usr.bin.fail2ban-server
  when: apparmor_enable_fail2ban_profile or item != 'usr.bin.fail2ban-server'
  failed_when: false
  changed_when: false
  tags: [apparmor, profiles, config, molecule-notest]

- name: AppArmor | Configure | Set AppArmor profile mode (enforce or complain)
  ansible.builtin.command: >-
    {{ apparmor_enforce_mode | ternary(apparmor_enforce_command, apparmor_complain_command) }}
    {{ apparmor_profiles_dir }}/{{ item }}
  loop: "{{ apparmor_profiles }}"
  failed_when: false
  changed_when: false
  tags: [apparmor, profiles, config, molecule-notest]
