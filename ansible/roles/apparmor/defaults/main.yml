---
# AppArmor Role - Default Variables

# ========================================
# Feature Toggles
# ========================================

# Enable/disable AppArmor deployment
apparmor_enabled: true

# Enable enforce mode (true) or complain mode (false)
# IMPORTANT: Set to false (complain mode) to avoid blocking SSH
# Complain mode logs violations but doesn't block them
apparmor_enforce_mode: false

# Enable Fail2ban profile
apparmor_enable_fail2ban_profile: true

# Enable desktop notifications (for workstations)
apparmor_notify_enabled: false

# ========================================
# AppArmor Configuration
# ========================================

# List of profiles to enforce/complain
apparmor_profiles:
  - usr.sbin.sshd
  - usr.bin.fail2ban-server

# Services brought under a custom AppArmor profile (authored in
# templates/apparmor.d/). Each item: {profile, template, mode}. template: ''
# means a stock/distro profile already on disk (nothing to render). mode
# defaults to 'complain' — observe denials first, then switch to 'enforce'
# per-item once the complain log is clean. Empty by default (generic role);
# set per-host in inventory. Attaching a loaded profile still needs the service
# to be restarted (AppArmor binds at exec) — the role does NOT restart services.
apparmor_confined_services: []

# NOTE: GRUB management removed - AppArmor enabled by default on Debian 10+
# Source: https://wiki.debian.org/AppArmor/HowToUse

# ========================================
# Directories
# ========================================

# Custom profiles directory
apparmor_profiles_dir: /etc/apparmor.d
apparmor_local_dir: /etc/apparmor.d/local

# ========================================
# Monitoring
# ========================================

# Enable AppArmor monitoring script
apparmor_monitoring_enabled: true

# Log rotation configuration
apparmor_logrotate_enabled: true
apparmor_log_retention_days: 30
