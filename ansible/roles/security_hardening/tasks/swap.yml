---
# Swap file as an OOM safety cushion. The box runs with no swap; a small file
# prevents hard OOM-kills under a memory spike. Not meant for regular paging
# (vm.swappiness kept low so RAM is preferred).

- name: Security Hardening | Swap | Detect existing active swap
  ansible.builtin.command: swapon --noheadings --show=NAME
  register: security_hardening_swap_active
  changed_when: false
  check_mode: false

- name: Security Hardening | Swap | Provision swapfile
  when:
    - security_hardening_swap_enabled | bool
    - security_hardening_swap_active.stdout | trim | length == 0
  block:
    - name: Security Hardening | Swap | Allocate swapfile
      ansible.builtin.command:
        cmd: "fallocate -l {{ security_hardening_swap_size }} {{ security_hardening_swap_file }}"
        creates: "{{ security_hardening_swap_file }}"

    - name: Security Hardening | Swap | Secure swapfile permissions
      ansible.builtin.file:
        path: "{{ security_hardening_swap_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Security Hardening | Swap | Format swapfile
      ansible.builtin.command:
        cmd: "mkswap {{ security_hardening_swap_file }}"
      register: security_hardening_mkswap
      changed_when: "'Setting up swapspace' in security_hardening_mkswap.stdout"

    - name: Security Hardening | Swap | Enable swapfile
      ansible.builtin.command:
        cmd: "swapon {{ security_hardening_swap_file }}"
      changed_when: true

- name: Security Hardening | Swap | Persist swapfile in fstab
  ansible.posix.mount:
    path: none
    src: "{{ security_hardening_swap_file }}"
    fstype: swap
    opts: sw
    state: present
  when: security_hardening_swap_enabled | bool

- name: Security Hardening | Swap | Prefer RAM (low swappiness)
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ security_hardening_swappiness | string }}"
    state: present
    sysctl_set: true
    reload: true
  when: security_hardening_swap_enabled | bool
