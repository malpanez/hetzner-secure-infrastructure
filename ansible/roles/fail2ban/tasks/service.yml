---
# Fail2ban Role - Service Management Tasks

- name: Fail2Ban | Service | Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  tags: [fail2ban, service]

- name: Fail2Ban | Service | Enable and start Fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  tags: [fail2ban, service]
