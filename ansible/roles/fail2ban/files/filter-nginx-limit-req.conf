# Matches nginx `json_combined` access logs (escape=json). limit_req_status is 429,
# so rate-limited requests are logged with "status":429; real client IP is in
# "remote_addr" (nginx real_ip from CF-Connecting-IP).
[Definition]
failregex = "remote_addr":"<HOST>".+"status":429
datepattern = "time_local":"%%d/%%b/%%Y:%%H:%%M:%%S %%z"
ignoreregex =
