# nginx access logs use the `json_combined` (escape=json) log_format, NOT the
# Apache combined format. The real client IP is in "remote_addr" (nginx real_ip
# rewrites it from CF-Connecting-IP). Match failed/blocked auth POSTs; status 302
# (successful login) is deliberately excluded so real logins are never banned.
[Definition]
failregex = "remote_addr":"<HOST>".+"request":"POST /(?:wp-login\.php|xmlrpc\.php)[^"]*".+"status":(?:200|401|403|429|503)
datepattern = "time_local":"%%d/%%b/%%Y:%%H:%%M:%%S %%z"
ignoreregex =
