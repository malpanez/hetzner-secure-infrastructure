---
# Nginx Role - Configuration Tasks

- name: Nginx | Configure | Create snippets directory
  ansible.builtin.file:
    path: "{{ nginx_snippets_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [nginx, config, directories]

# ========================================
# Deploy Modular Nginx Configuration
# ========================================
# NOTE: owner/group/mode are set inline on each of the 8 deploy tasks below (not
# via a module_defaults block) to keep the template-deploy count in this file
# unambiguous — a module_defaults dict key for the template module would add an
# extra match when grepping for template deploy tasks.

- name: Nginx | Configure | Deploy rate limiting config
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: conf.d/rate-limits.conf.j2
    dest: /etc/nginx/conf.d/rate-limits.conf
    owner: root
    group: root
    mode: '0644'
  when: nginx_enable_rate_limiting | default(true)
  register: nginx_rate_limits_deployed
  notify: reload nginx
  tags: [nginx, config, security]

- name: Nginx | Configure | Deploy Cloudflare real IP config
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: conf.d/cloudflare-real-ip.conf.j2
    dest: /etc/nginx/conf.d/cloudflare-real-ip.conf
    owner: root
    group: root
    mode: '0644'
  when: nginx_cloudflare_enabled | default(true)
  register: nginx_cloudflare_deployed
  notify: reload nginx
  tags: [nginx, config, cloudflare]

- name: Nginx | Configure | Deploy security headers config
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: conf.d/security-headers.conf.j2
    dest: /etc/nginx/conf.d/security-headers.conf
    owner: root
    group: root
    mode: '0644'
  when: nginx_enable_security_headers | default(true)
  register: nginx_security_headers_deployed
  notify: reload nginx
  tags: [nginx, config, security]

- name: Nginx | Configure | Deploy JSON logging config
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: conf.d/logging.conf.j2
    dest: /etc/nginx/conf.d/logging.conf
    owner: root
    group: root
    mode: '0644'
  when: nginx_enable_json_logging | default(true)
  register: nginx_logging_deployed
  notify: reload nginx
  tags: [nginx, config, logging]

- name: Nginx | Configure | Deploy stub_status config
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: conf.d/stub-status.conf.j2
    dest: /etc/nginx/conf.d/stub-status.conf
    owner: root
    group: root
    mode: '0644'
  when: nginx_enable_stub_status | default(true)
  register: nginx_stub_status_deployed
  notify: reload nginx
  tags: [nginx, config, stub-status]

- name: Nginx | Configure | Deploy SSL parameters snippet
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: snippets/ssl-params.conf.j2
    dest: "{{ nginx_snippets_dir }}/ssl-params.conf"
    owner: root
    group: root
    mode: '0644'
  register: nginx_ssl_params_deployed
  notify: reload nginx
  tags: [nginx, config, ssl]

- name: Nginx | Configure | Deploy gzip parameters snippet
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: snippets/gzip-params.conf.j2
    dest: "{{ nginx_snippets_dir }}/gzip-params.conf"
    owner: root
    group: root
    mode: '0644'
  register: nginx_gzip_params_deployed
  notify: reload nginx
  tags: [nginx, config, performance]

- name: Nginx | Configure | Deploy static assets snippet
  ansible.builtin.template:  # noqa: risky-file-permissions
    src: snippets/static-assets.conf.j2
    dest: "{{ nginx_snippets_dir }}/static-assets.conf"
    owner: root
    group: root
    mode: '0644'
  register: nginx_static_assets_deployed
  notify: reload nginx
  tags: [nginx, config, performance]

- name: Nginx | Configure | Validate Nginx configuration
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false
  register: nginx_config_test
  tags: [nginx, config, validate]

- name: Nginx | Configure | Assert Nginx configuration is valid
  ansible.builtin.assert:
    that:
      - nginx_config_test.rc == 0
    success_msg: "Nginx configuration syntax is valid"
    fail_msg: "Nginx configuration validation failed: {{ nginx_config_test.stderr | default('unknown error') }}"
  tags: [nginx, config, validate]
