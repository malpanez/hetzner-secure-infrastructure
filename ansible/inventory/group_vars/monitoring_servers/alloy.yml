---
# Grafana Alloy Configuration for Monitoring Servers
# Replaces Promtail (removed in Loki 3.x) as log shipper
# Official grafana.grafana.alloy role configuration

alloy_version: "1.15.0"
alloy_expose_port: false

alloy_user_groups:
  - "systemd-journal"
  - "adm"

alloy_env_file_vars:
  CUSTOM_ARGS: "--server.http.listen-addr=127.0.0.1:12345"

alloy_config: |
  // Log shipping configuration for Loki

  local.file_match "system_logs" {
    path_targets = [
      {"__address__" = "localhost", "__path__" = "/var/log/syslog",       "job" = "syslog",    "instance" = "{{ ansible_facts['fqdn'] }}"},
      {"__address__" = "localhost", "__path__" = "/var/log/auth.log",     "job" = "auth",      "instance" = "{{ ansible_facts['fqdn'] }}"},
      {"__address__" = "localhost", "__path__" = "/var/log/fail2ban.log", "job" = "fail2ban",  "instance" = "{{ ansible_facts['fqdn'] }}"},
    ]
  }

  local.file_match "nginx_access_logs" {
    path_targets = [
      {"__address__" = "localhost", "__path__" = "/var/log/nginx/*-access.log", "job" = "nginx_access", "instance" = "{{ ansible_facts['fqdn'] }}"},
    ]
  }

  local.file_match "nginx_error_logs" {
    path_targets = [
      {"__address__" = "localhost", "__path__" = "/var/log/nginx/*-error.log", "job" = "nginx_error", "instance" = "{{ ansible_facts['fqdn'] }}"},
    ]
  }

  local.file_match "app_logs" {
    path_targets = [
      {"__address__" = "localhost", "__path__" = "/var/log/php*-fpm.log",                             "job" = "php_fpm",       "instance" = "{{ ansible_facts['fqdn'] }}"},
      {"__address__" = "localhost", "__path__" = "/var/log/mysql/error.log",                          "job" = "mariadb_error", "instance" = "{{ ansible_facts['fqdn'] }}"},
      {"__address__" = "localhost", "__path__" = "/var/log/mysql/slow.log",                           "job" = "mariadb_slow",  "instance" = "{{ ansible_facts['fqdn'] }}"},
      {"__address__" = "localhost", "__path__" = "{{ wordpress_root }}/wp-content/debug.log",         "job" = "wordpress",     "instance" = "{{ ansible_facts['fqdn'] }}"},
    ]
  }

  loki.source.file "system_logs" {
    targets    = local.file_match.system_logs.targets
    forward_to = [loki.write.local.receiver]
  }

  loki.source.file "nginx_access_logs" {
    targets    = local.file_match.nginx_access_logs.targets
    forward_to = [loki.process.nginx_json.receiver]
  }

  loki.source.file "nginx_error_logs" {
    targets    = local.file_match.nginx_error_logs.targets
    forward_to = [loki.write.local.receiver]
  }

  loki.process "nginx_json" {
    stage.json {
      expressions = {
        request_id            = "request_id",
        status                = "status",
        request_time          = "request_time",
        upstream_cache_status = "upstream_cache_status",
        host                  = "host",
        remote_addr           = "remote_addr",
      }
    }

    stage.labels {
      values = {
        status = "status",
        host   = "host",
      }
    }

    stage.structured_metadata {
      values = {
        request_id            = "request_id",
        upstream_cache_status = "upstream_cache_status",
        remote_addr           = "remote_addr",
      }
    }

    stage.timestamp {
      source = "time_local"
      format = "02/Jan/2006:15:04:05 -0700"
    }

    forward_to = [loki.write.local.receiver]
  }

  loki.source.file "app_logs" {
    targets    = local.file_match.app_logs.targets
    forward_to = [loki.write.local.receiver]
  }

  loki.write "local" {
    endpoint {
      url = "http://127.0.0.1:3100/loki/api/v1/push"
    }
  }
